<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Dog Habit Game</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito','Noto Sans TC',sans-serif;background:#e8def8;overflow:hidden;height:100vh;width:100vw;user-select:none;}
.snd-tog{background:rgba(255,255,255,.25);border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
@media(orientation:portrait){
  .game-wrap{grid-template-columns:1fr !important;grid-template-rows:auto 240px 1fr !important;}
  .left-panel{max-height:240px;}
  .hdr-title{font-size:15px !important;}
  .hbadge{font-size:12px !important;padding:4px 8px !important;}
}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:5000;display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:14px;}
.overlay.show{display:flex;}
.setup-bg{background:linear-gradient(135deg,#667eea,#764ba2);}
.lock-bg{background:rgba(30,10,60,.95);}
.cel-bg{background:rgba(0,0,0,.88);}
.setup-bg h1{font-size:34px;text-shadow:2px 2px 8px rgba(0,0,0,.3);}
.setup-bg h2{font-size:20px;font-weight:700;}
.breed-grid{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin:10px 0;}
.breed-card{background:rgba(255,255,255,.15);border:3px solid transparent;border-radius:20px;padding:14px 18px;text-align:center;cursor:pointer;transition:all .2s;min-width:110px;}
.breed-card:hover{background:rgba(255,255,255,.25);transform:translateY(-4px);}
.breed-card.sel{border-color:#FFD700;background:rgba(255,215,0,.2);}
.breed-card .emoji{font-size:44px;display:block;margin-bottom:6px;}
.breed-card .bname{font-size:15px;font-weight:700;}
.breed-card .bdesc{font-size:11px;opacity:.8;margin-top:4px;}
.s-input{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);border-radius:12px;color:#fff;font-size:18px;padding:10px 16px;width:220px;text-align:center;font-family:inherit;}
.s-input::placeholder{color:rgba(255,255,255,.5);}
.s-btn{background:linear-gradient(135deg,#f59e0b,#ef4444);border:none;border-radius:16px;color:#fff;font-size:18px;font-weight:700;padding:12px 36px;cursor:pointer;box-shadow:0 4px 15px rgba(0,0,0,.3);font-family:inherit;}
.s-btn:active{transform:scale(.95);}.s-btn:disabled{opacity:.4;cursor:not-allowed;}
.setup-step{display:none;flex-direction:column;align-items:center;gap:14px;}
.setup-step.active{display:flex;}
.pin-dots{display:flex;gap:10px;}
.pin-d{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.5);background:transparent;transition:all .2s;}
.pin-d.on{background:#FFD700;border-color:#FFD700;}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:240px;}
.nk{padding:14px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);border-radius:12px;color:#fff;font-size:20px;font-weight:700;cursor:pointer;text-align:center;font-family:inherit;}
.nk:active{background:rgba(255,255,255,.3);}
.tut-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:4500;display:none;align-items:center;justify-content:center;}
.tut-overlay.show{display:flex;}
.tut-box{background:#fff;border-radius:24px;padding:24px 32px;max-width:420px;text-align:center;color:#374151;box-shadow:0 8px 30px rgba(0,0,0,.3);}
.tut-box .tut-emoji{font-size:56px;display:block;margin-bottom:12px;}
.tut-box h3{font-size:20px;color:#7c3aed;margin-bottom:8px;}
.tut-box p{font-size:15px;line-height:1.8;margin-bottom:14px;color:#6b7280;white-space:pre-line;}
.tut-btn{background:linear-gradient(135deg,#7c3aed,#6d28d9);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:700;padding:10px 28px;cursor:pointer;font-family:inherit;}
.game-wrap{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto 1fr;height:100vh;width:100vw;background:#f0e6ff;}
.hdr{grid-column:1/-1;background:linear-gradient(90deg,#7c3aed,#6d28d9);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.2);}
.hdr-title{font-size:20px;font-weight:900;text-shadow:1px 1px 4px rgba(0,0,0,.3);}
.hdr-stats{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.hbadge{background:rgba(255,255,255,.2);border-radius:20px;padding:5px 12px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:4px;}
.timer-badge{background:rgba(255,255,255,.15);border-radius:20px;padding:5px 12px;font-size:13px;color:#fbbf24;}
.left-panel{display:flex;flex-direction:column;overflow:hidden;position:relative;}
.scene-wrap{flex:1;position:relative;overflow:hidden;cursor:pointer;}
#sceneCanvas{width:100%;height:100%;display:block;}
.place-indicator{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(124,58,237,.9);color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:700;display:none;z-index:10;pointer-events:none;}
.place-indicator.show{display:block;}
/* Pet stats overlay on left panel */
.pet-stats-overlay{position:absolute;top:8px;left:8px;width:150px;display:flex;flex-direction:column;gap:6px;z-index:10;pointer-events:none;}
.pso-item{flex:1;background:rgba(0,0,0,.5);border-radius:10px;padding:4px 6px;display:flex;flex-direction:column;gap:2px;}
.pso-label{font-size:10px;color:#fff;font-weight:700;display:flex;justify-content:space-between;}
.pso-bg{height:8px;background:rgba(255,255,255,.25);border-radius:4px;overflow:hidden;}
.pso-fill{height:100%;border-radius:4px;transition:width .5s;}
.pso-fill.happy{background:linear-gradient(90deg,#ec4899,#f472b6);}
.pso-fill.hunger{background:linear-gradient(90deg,#ef4444,#f87171);}
.pso-fill.energy{background:linear-gradient(90deg,#f59e0b,#fbbf24);}
/* Backpack toggle button */
.bp-toggle{position:absolute;top:8px;right:8px;z-index:12;background:rgba(124,58,237,.9);border:none;border-radius:14px;color:#fff;padding:8px 14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;gap:4px;}
.bp-toggle:active{transform:scale(.95);}
/* Backpack popup overlay */
.bp-popup{position:fixed;top:0;left:0;width:100%;height:100%;z-index:3000;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);animation:bpFadeIn .2s;}
.bp-popup.show{display:flex;}
@keyframes bpFadeIn{from{opacity:0}to{opacity:1}}
@keyframes bpPop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.bp-inner{background:#fff;border-radius:24px;padding:20px;max-width:420px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.3);position:relative;max-height:80vh;overflow-y:auto;animation:bpPop .25s;}
.bp-close{position:absolute;top:10px;right:10px;background:#fee2e2;border:2px solid #ef4444;border-radius:50%;width:38px;height:38px;font-size:22px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#dc2626;font-family:inherit;transition:transform .15s;}
.bp-close:hover{background:#fecaca;transform:rotate(90deg);}
.bp-title{font-size:18px;font-weight:900;color:#7c3aed;margin-bottom:12px;}
.bp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0;}
.bp-slot{width:100%;aspect-ratio:1;border:2px dashed #d1d5db;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;background:#faf5ff;transition:all .15s;position:relative;}
.bp-slot.filled{border:2px solid #7c3aed;background:#ede9fe;}
.bp-slot.equipped{border-color:#f59e0b;background:#fef3c7;}
.bp-slot .eq-dot{position:absolute;top:4px;right:4px;width:12px;height:12px;border-radius:50%;background:#f59e0b;}
.bp-slot .item-name{position:absolute;bottom:2px;font-size:8px;color:#6b7280;font-weight:700;}
.bp-actions{display:flex;gap:8px;margin-top:12px;justify-content:center;}
.bp-act-btn{padding:8px 20px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff;}
.bp-act-btn.expand{background:linear-gradient(135deg,#f59e0b,#d97706);}
.bp-act-btn.expand:disabled{opacity:.4;cursor:not-allowed;}
.bp-act-btn.discard{background:linear-gradient(135deg,#ef4444,#dc2626);}
.bp-selected-info{text-align:center;padding:8px;background:#ede9fe;border-radius:12px;margin-top:8px;font-size:13px;color:#6d28d9;font-weight:700;display:none;}
.right-panel{display:flex;flex-direction:column;overflow:hidden;background:#f5f3ff;}
.tabs2{display:flex;background:#fff;border-bottom:2px solid #e5e7eb;overflow-x:auto;}
.tab2{flex:1;padding:9px 4px;font-size:12px;font-weight:700;text-align:center;cursor:pointer;border:none;background:transparent;color:#9ca3af;border-bottom:3px solid transparent;font-family:inherit;white-space:nowrap;min-width:0;}
.tab2.on{color:#7c3aed;border-bottom-color:#7c3aed;}
.pane2{display:none;flex:1;overflow-y:auto;padding:10px 14px;animation:fadeIn .2s;}
.pane2.on{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card{background:#fff;border-radius:16px;padding:12px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.card-title{font-size:17px;font-weight:900;color:#7c3aed;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.habit2{display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:6px;background:#fff;border-radius:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;border:2px solid #e5e7eb;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.habit2:active{transform:scale(.98);}
.habit2.done{border-color:#10b981;background:#ecfdf5;}
.hcb2{width:26px;height:26px;border-radius:50%;border:3px solid #d1d5db;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .2s;color:transparent;}
.habit2.done .hcb2{background:#10b981;border-color:#10b981;color:#fff;}
.htxt2{font-size:15px;color:#374151;flex:1;font-weight:500;}
.habit2.done .htxt2{color:#10b981;text-decoration:line-through;}
.habit2.mandatory .htxt2::after{content:' \2605';color:#f59e0b;}
.hbone2{font-size:13px;color:#f59e0b;font-weight:700;}
.streak-info{background:linear-gradient(135deg,#ff6b35,#f59e0b);color:#fff;border-radius:14px;padding:10px 14px;margin-bottom:10px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
.big-btn2{width:100%;padding:14px;background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:16px;color:#fff;font-size:18px;font-weight:900;cursor:pointer;box-shadow:0 4px 15px rgba(16,185,129,.4);font-family:inherit;display:none;margin-top:8px;}
.big-btn2:active{transform:scale(.97);}
.mood-bars{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.mood-item{flex:1;display:flex;flex-direction:column;gap:3px;min-width:80px;}
.mood-label{font-size:12px;color:#6b7280;font-weight:700;}
.mood-bg{height:12px;background:#e5e7eb;border-radius:6px;overflow:hidden;}
.mood-fill{height:100%;border-radius:6px;transition:width .5s;}
.mood-fill.happy{background:linear-gradient(90deg,#ec4899,#f472b6);}
.mood-fill.energy{background:linear-gradient(90deg,#f59e0b,#fbbf24);}
.mood-fill.hunger{background:linear-gradient(90deg,#ef4444,#f87171);}
.dog-say{background:#ede9fe;border-radius:14px;padding:8px 12px;font-size:14px;color:#6d28d9;text-align:center;margin-bottom:8px;font-weight:500;border:2px solid #ddd6fe;}
.prog2{font-size:13px;color:#9ca3af;text-align:center;margin-bottom:8px;}
.dog-bubble{position:absolute;background:#fff;border-radius:16px;padding:10px 16px;font-size:13px;font-weight:700;color:#7c3aed;box-shadow:0 4px 15px rgba(0,0,0,.2);z-index:20;cursor:pointer;max-width:200px;text-align:center;display:none;line-height:1.6;}
.dog-bubble::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);border:8px solid transparent;border-top-color:#fff;}
.dog-bubble .dismiss-hint{font-size:9px;color:#9ca3af;margin-top:4px;display:block;}
.dog-bubble.show{display:block;animation:bubblePop .3s ease-out;}
@keyframes bubblePop{from{opacity:0;transform:scale(.8) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.shop-grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.shop-card{background:#fff;border:2px solid #e5e7eb;border-radius:16px;padding:10px;text-align:center;cursor:pointer;transition:all .2s;}
.shop-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1);}
.shop-card .sc-icon{font-size:32px;display:block;margin-bottom:4px;}
.shop-card .sc-name{font-size:13px;font-weight:700;color:#374151;}
.shop-card .sc-desc{font-size:10px;color:#9ca3af;margin:2px 0;}
.shop-card .sc-price{font-size:13px;color:#f59e0b;font-weight:700;}
.shop-card .sc-reason{font-size:9px;color:#ef4444;font-weight:700;margin-top:2px;}
.shop-btn2{margin-top:4px;padding:5px 12px;border:none;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff;background:linear-gradient(135deg,#7c3aed,#6d28d9);}
.shop-btn2.bag-open{background:linear-gradient(135deg,#f59e0b,#d97706);}
.shop-card.cannot{opacity:.85;}
.sc-reason.bpfull{background:#fef3c7;color:#b45309;cursor:pointer;font-weight:700;padding:2px 6px;border-radius:8px;margin-top:3px;}
.shop-btn2:disabled{opacity:.4;cursor:not-allowed;}
.shop-cat{font-size:15px;font-weight:900;color:#7c3aed;margin:10px 0 6px;display:flex;align-items:center;gap:6px;}
.cal2{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin:8px 0;}
.cd2{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border-radius:10px;background:#f3f4f6;color:#9ca3af;}
.cd2.ok{background:#d1fae5;color:#059669;}.cd2.miss{background:#fee2e2;color:#ef4444;}
.cd2.today{box-shadow:0 0 0 3px #7c3aed;color:#7c3aed;background:#ede9fe;}.cd2.hd{background:transparent;font-size:11px;color:#6b7280;}
.stats-row2{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0;}
.stat2{background:#fff;border-radius:14px;padding:10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.stat2 .sn{font-size:26px;font-weight:900;}.stat2 .sl{font-size:10px;color:#9ca3af;margin-top:2px;}
.htable2{width:100%;border-collapse:separate;border-spacing:0 3px;font-size:12px;}
.htable2 th{background:#ede9fe;color:#7c3aed;padding:6px;border-radius:8px;font-size:11px;}
.htable2 td{background:#fff;padding:6px;text-align:center;}
.ach-grid2{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:6px 0;}
.ach2{background:#f3f4f6;border-radius:14px;padding:8px;text-align:center;opacity:.4;}
.ach2.on{opacity:1;background:#fef3c7;border:2px solid #f59e0b;}
.ach2 .ai{font-size:26px;display:block;}.ach2 .an{font-size:10px;font-weight:700;color:#92400e;}.ach2 .ad{font-size:9px;color:#9ca3af;}
.wk-challenge{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border-radius:14px;padding:10px 14px;margin-bottom:10px;font-size:14px;font-weight:700;}
.wk-challenge .wk-prog{background:rgba(255,255,255,.25);height:10px;border-radius:5px;margin-top:6px;overflow:hidden;}
.wk-challenge .wk-fill{height:100%;background:#FFD700;border-radius:5px;transition:width .5s;}
.sgroup2{background:#fff;border-radius:16px;padding:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.sgroup2 h3{font-size:15px;font-weight:900;color:#7c3aed;margin-bottom:8px;}
.srow2{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;}
.slbl2{font-size:14px;color:#374151;font-weight:500;}
.sinput{background:#f3f4f6;border:2px solid #e5e7eb;border-radius:10px;color:#374151;font-size:14px;padding:7px 10px;font-family:inherit;}
.sbtn{background:linear-gradient(135deg,#7c3aed,#6d28d9);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;padding:8px 14px;cursor:pointer;font-family:inherit;}
.sbtn:active{transform:scale(.97);}.sbtn.green{background:linear-gradient(135deg,#10b981,#059669);}.sbtn.red{background:linear-gradient(135deg,#ef4444,#dc2626);}
.hm-item2{display:flex;align-items:center;gap:8px;padding:6px 8px;background:#f3f4f6;border-radius:10px;margin-bottom:5px;font-size:13px;color:#374151;}
.hm-item2 button{margin-left:auto;background:#fee2e2;border:none;border-radius:8px;color:#ef4444;padding:3px 8px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;}
.kid-tag{display:inline-block;margin:3px;padding:5px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:2px solid #e5e7eb;background:#fff;color:#6b7280;transition:all .2s;}
.kid-tag.sel{border-color:#10b981;background:#ecfdf5;color:#059669;}
.cel-bg h1{font-size:34px;color:#FFD700;text-shadow:2px 2px 8px rgba(0,0,0,.5);}
.cel-msg{font-size:16px;line-height:1.8;text-align:center;}
.cel-bones{font-size:36px;animation:pop2 1s ease-in-out infinite;}
@keyframes pop2{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.cel-streak-info{font-size:16px;color:#FF6B35;font-weight:700;}
.cel-close2{margin-top:14px;padding:12px 28px;background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:16px;color:#fff;font-size:18px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 4px 15px rgba(16,185,129,.4);}
.particle2{position:fixed;pointer-events:none;font-size:20px;z-index:5001;animation:fly2 1.5s ease-out forwards;}
@keyframes fly2{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
.float-bone2{position:fixed;pointer-events:none;font-size:18px;z-index:2999;color:#f59e0b;font-weight:900;animation:floatUp2 1.5s ease-out forwards;}
@keyframes floatUp2{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
.mg-wrap{text-align:center;}
.mg-q{font-size:22px;font-weight:900;color:#374151;margin:16px 0 10px;line-height:1.6;}
.mg-hint{font-size:13px;color:#9ca3af;margin-bottom:12px;}
.mg-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
.mg-opt{padding:14px 10px;border:3px solid #e5e7eb;border-radius:16px;font-size:16px;font-weight:700;cursor:pointer;background:#fff;color:#374151;transition:all .2s;font-family:inherit;}
.mg-opt:hover{border-color:#7c3aed;background:#ede9fe;}
.mg-opt.correct{border-color:#10b981;background:#d1fae5;color:#059669;}
.mg-opt.wrong{border-color:#ef4444;background:#fee2e2;color:#ef4444;}
.mg-spell-input{font-size:24px;letter-spacing:8px;text-align:center;width:90%;max-width:300px;padding:12px;border:3px solid #7c3aed;border-radius:16px;color:#374151;font-family:inherit;font-weight:700;background:#faf5ff;margin:10px auto;display:block;}
.mg-spell-input:focus{outline:none;border-color:#6d28d9;box-shadow:0 0 0 4px rgba(124,58,237,.2);}
.mg-submit{padding:10px 30px;background:linear-gradient(135deg,#7c3aed,#6d28d9);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;}
.mg-result{font-size:18px;font-weight:700;margin:12px 0;min-height:30px;}
.mg-score{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border-radius:14px;padding:10px 16px;font-size:15px;font-weight:700;display:inline-block;margin:8px 0;}
.mg-diff{display:flex;gap:6px;justify-content:center;margin:8px 0;}
.mg-diff-btn{padding:6px 16px;border:2px solid #e5e7eb;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;background:#fff;color:#6b7280;font-family:inherit;}
.mg-diff-btn.on{border-color:#7c3aed;background:#ede9fe;color:#7c3aed;}
.mg-start-btn{padding:14px 40px;background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:16px;color:#fff;font-size:18px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 4px 15px rgba(16,185,129,.3);margin:16px 0;}

/* ============= LEVEL-UP POPUP ============= */
.lu-popup{position:fixed;top:0;left:0;width:100%;height:100%;z-index:5000;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);}
.lu-popup.show{display:flex;animation:luFadeIn .3s;}
.lu-inner{background:linear-gradient(135deg,#fef3c7,#fde68a,#fbbf24);border-radius:28px;padding:28px 24px;max-width:340px;width:88%;text-align:center;box-shadow:0 20px 60px rgba(245,158,11,.5);animation:luPop .55s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden;}
.lu-inner::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:repeating-conic-gradient(from 0deg,rgba(255,255,255,.15) 0deg 10deg,transparent 10deg 20deg);animation:luRotate 6s linear infinite;pointer-events:none;}
.lu-content{position:relative;z-index:2;}
.lu-title{font-size:32px;font-weight:900;color:#b45309;text-shadow:0 2px 0 #fff;margin-bottom:2px;letter-spacing:2px;animation:luBounce .8s ease-in-out infinite alternate;}
.lu-sub{font-size:14px;font-weight:700;color:#92400e;margin-bottom:14px;}
.lu-lv-big{font-size:78px;font-weight:900;background:linear-gradient(135deg,#f59e0b,#ef4444,#ec4899);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin:8px 0;text-shadow:0 4px 20px rgba(245,158,11,.4);}
.lu-lv-label{font-size:14px;color:#92400e;font-weight:900;margin-top:-4px;margin-bottom:14px;}
.lu-rewards{background:rgba(255,255,255,.7);border-radius:18px;padding:12px;margin:10px 0;border:2px dashed #f59e0b;}
.lu-reward-row{display:flex;align-items:center;justify-content:center;gap:10px;padding:6px 0;font-size:16px;font-weight:700;color:#7c2d12;}
.lu-reward-icon{font-size:32px;}
.lu-reward-text{font-size:15px;font-weight:900;}
.lu-bone-num{color:#f59e0b;font-size:22px;font-weight:900;}
.lu-mystery{background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff;border-radius:14px;padding:10px;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 12px rgba(168,85,247,.4);}
.lu-mystery-icon{font-size:40px;animation:luWiggle 1s ease-in-out infinite;}
.lu-expand-msg{background:#d1fae5;color:#059669;border-radius:12px;padding:8px;margin-top:8px;font-size:13px;font-weight:800;}
.lu-close{margin-top:14px;padding:12px 36px;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:0 4px 15px rgba(245,158,11,.4);}
@keyframes luFadeIn{from{opacity:0}to{opacity:1}}
@keyframes luPop{0%{opacity:0;transform:scale(.3) rotate(-12deg)}60%{transform:scale(1.1) rotate(3deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
@keyframes luRotate{to{transform:rotate(360deg)}}
@keyframes luBounce{from{transform:translateY(0)}to{transform:translateY(-6px)}}
@keyframes luWiggle{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}}
/* LV progress bar in Game tab */
.lv-bar{background:linear-gradient(135deg,#ede9fe,#ddd6fe);border:2px solid #a78bfa;border-radius:14px;padding:8px 12px;margin-bottom:10px;}
.lv-bar-top{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:800;color:#6d28d9;margin-bottom:4px;}
.lv-bar-track{background:rgba(124,58,237,.15);height:10px;border-radius:5px;overflow:hidden;}
.lv-bar-fill{height:100%;background:linear-gradient(90deg,#a855f7,#ec4899,#f59e0b);border-radius:5px;transition:width .5s;}
.lv-bar-info{font-size:11px;color:#6b7280;margin-top:3px;text-align:right;}
.lv-badge{display:inline-block;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:900;margin-right:6px;}
.lv-review{background:#fee2e2;color:#b91c1c;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:800;margin-left:4px;}
</style>

function useMysteryItem(id,idx){

    updatePetStats();
  }else if(eff==='feather'){
    for(let i=0;i<4;i++)S.backpack.push(null);

    alert('🪶 '+(curLang==='zh'?'鳳凰羽毛飛翔！\n':' Phoenix Feather shines!\n')+(curLang==='zh'?meta.effectZh:meta.effectEn));

function getLvFromXp(xp){let lv=1;for(let i=1;i<XP_THRESH.length;i++){if(xp>=XP_THRESH[i])lv=i+1;}return lv;}
function xpToNextLv(xp){const lv=getLvFromXp(xp);if(lv>=XP_THRESH.length)return {cur:0,need:0,pct:100};const cur=xp-XP_THRESH[lv-1];const need=XP_THRESH[lv]-XP_THRESH[lv-1];return {cur,need,pct:Math.floor(cur/need*100)};}

{id:3,tEn:'Buddy and the Orange Cat',tZh:'Buddy \u548C\u6A58\u8C93',cEn:'A fluffy orange cat named Miso lived next door. At first she hissed at Buddy over the fence. But one rainy afternoon, Buddy dropped a biscuit through the gap. Miso sniffed it, then pushed a little ball of yarn back. After that day, they traded gifts every week. They became best friends without ever saying a word.',cZh:'\u9694\u58C1\u4F4F\u8457\u4E00\u96BB\u53EB\u5473\u564C\u7684\u6A58\u8272\u80D6\u8C93\u3002\u4E00\u958B\u59CB\u5979\u7E3D\u5C0D\u8457\u7C6C\u7B06\u9AA8\u5C0D Buddy \u54C8\u6C23\u3002\u4F46\u5728\u4E00\u500B\u4E0B\u96E8\u7684\u4E0B\u5348\uFF0CBuddy \u5F9E\u7E2B\u96B1\u4E2D\u63A8\u4E86\u4E00\u584A\u9905\u4E7E\u904E\u53BB\u3002\u5473\u564C\u805E\u4E86\u805E\uFF0C\u7136\u5F8C\u63A8\u4E86\u4E00\u9846\u6BDB\u7DDA\u7403\u56DE\u4F86\u3002\u5F9E\u90A3\u5929\u8D77\uFF0C\u4ED6\u5011\u6BCF\u9031\u90FD\u4EA4\u63DB\u793C\u7269\u3002\u4ED6\u5011\u6C92\u8AAA\u904E\u4E00\u53E5\u8A71\uFF0C\u537B\u6210\u4E86\u6700\u597D\u7684\u670B\u53CB\u3002'},
{id:4,tEn:'Where Is My Bone?',tZh:'\u6211\u7684\u9AA8\u982D\u5462\uFF1F',cEn:'Buddy\u2019s favorite bone disappeared. He looked under the sofa. Under the bed. Inside his water bowl (messy!). Everywhere! Finally he dug up the yard and found it right where he buried it three days ago. \u201CI hid it from myself!\u201D he thought, and happily chewed on it.',cZh:'Buddy \u6700\u611B\u7684\u9AA8\u982D\u4E0D\u898B\u4E86\u3002\u4ED6\u627E\u904E\u6C99\u767C\u4E0B\u3001\u5E8A\u5E95\u4E0B\u3001\u751A\u81F3\u9084\u5230\u6C34\u76C6\u88E1\u7FFB\uFF08\u5F04\u5F97\u6FD5\u7B54\u7B54\u7684\uFF01\uFF09\u3002\u6700\u5F8C\u4ED6\u5728\u9662\u5B50\u88E1\u6316\u554A\u6316\uFF0C\u5728\u4E09\u5929\u524D\u81EA\u5DF1\u57CB\u4E0B\u7684\u5730\u65B9\u627E\u5230\u4E86\u5B83\u3002\u300C\u539F\u4F86\u6211\u628A\u5B83\u85CF\u904E\u5230\u81EA\u5DF1\u4E5F\u627E\u4E0D\u5230\u4E86\uFF01\u300D\u4ED6\u5FC3\u60F3\uFF0C\u958B\u5FC3\u5730\u556C\u8D77\u9AA8\u982D\u3002'},
{id:5,tEn:'The Rainy Puddle Adventure',tZh:'\u6C34\u7A62\u91CC\u7684\u96E8\u5929\u5192\u96AA',cEn:'Thunder rumbled. Rain poured. Buddy pressed his nose to the window. Then he spotted the biggest puddle in the yard. He raced outside and jumped in \u2014 SPLASH! He spun in circles, shaking drops everywhere. His owner came with a towel, laughing. That night Buddy slept dry and warm, dreaming of puddles.',cZh:'\u96F7\u8072\u8F5F\u8F5F\uFF0C\u5927\u96E8\u5EFE\u565F\u5927\u4F5C\u3002Buddy \u628A\u9F3B\u5B50\u8CBC\u5728\u7A97\u4E0A\uFF0C\u7A81\u7136\u770B\u5230\u9662\u5B50\u88E1\u6709\u4E00\u5149\u597D\u5927\u7684\u6C34\u7A62\u3002\u4ED6\u885D\u51FA\u95E8\u5916\uFF0C\u776A\u7684\u4E00\u8072\u8DF3\u9032\u53BB\uFF01\u4ED6\u8EAB\u88E1\u5706\u5708\u4E0D\u6232\uFF0C\u6C34\u73E0\u55EE\u55A9\u55EE\u55A9\u63A1\u6EFF\u5730\u3002\u4E3B\u4EBA\u8DD1\u904E\u4F86\u50F5\u4F4F\u4ED6\uFF0C\u4E5F\u7B11\u5F97\u611B\u4E0D\u91CB\u624B\u3002\u90A3\u5929\u6669\u4E0A Buddy \u7761\u5F97\u4E7E\u7167\u6EAB\u6696\uFF0C\u5922\u88E1\u90FD\u662F\u6C34\u7A62\u3002'},
{id:6,tEn:'Learning to Sit',tZh:'\u5B78\u8457\u505A\u300C\u5750\u4E0B\u300D',cEn:'\u201CSit, Buddy!\u201D said his owner. Buddy tilted his head. Sit? What is sit? He tried rolling. He tried lying down. He even tried a backflip! After many treats and many tries, his bottom finally touched the floor at the right moment. \u201CGood boy!\u201D his owner cheered. From that day on, he sat proudly whenever asked.',cZh:'\u300CBuddy\uFF0C\u5750\u4E0B\uFF01\u300D\u4E3B\u4EBA\u8AAA\u3002Buddy \u6B6A\u8457\u982D\u3002\u5750\u4E0B\uFF1F\u90A3\u662F\u4EC0\u9EBC\uFF1FBuddy \u8A66\u8457\u7FFB\u6EFE\u3001\u8A66\u8457\u8DB4\u4E0B\u3001\u751A\u81F3\u9084\u8A66\u4E86\u4E00\u500B\u5F8C\u7A7A\u7FFB\uFF01\u5403\u4E86\u8A31\u591A\u96F6\u98DF\u3001\u5931\u6557\u4E86\u8A31\u591A\u6B21\uFF0C\u4ED6\u7684\u5C41\u80A1\u7D42\u65BC\u5728\u5C0D\u7684\u6642\u6A5F\u78B0\u5230\u4E86\u5730\u677F\u3002\u300C\u597D\u68D2\u54E6\uFF01\u300D\u4E3B\u4EBA\u5927\u8072\u6B61\u547C\u3002\u5F9E\u90A3\u5929\u8D77\uFF0C\u4ED6\u4E00\u88AB\u53EB\u5C31\u9A55\u50B2\u7684\u5750\u4E0B\u3002'},
{id:7,tEn:'Helping a Lost Puppy',tZh:'\u5E6B\u52A9\u8FF7\u8DEF\u7684\u5C0F\u72D7',cEn:'In the park one day, Buddy heard a soft whimper behind a bush. It was a tiny lost puppy named Pip. Buddy nudged him gently and led him in circles until the owner came running, tears in her eyes. She hugged both dogs. \u201CYou\u2019re a hero, Buddy,\u201D she said. Buddy just wagged his tail.',cZh:'\u4E00\u5929\u5728\u516C\u5712\u88E1\uFF0CBuddy \u807D\u5230\u6F8C\u6728\u5F8C\u9762\u50B3\u4F86\u5FAE\u5F31\u7684\u55DA\u54BD\u8072\u3002\u539F\u4F86\u662F\u4E00\u96BB\u8FF7\u8DEF\u7684\u5C0F\u72D7\uFF0C\u53EB\u505A Pip\u3002Buddy \u6EAB\u67D4\u5730\u7528\u9F3B\u5B50\u78B0\u4ED6\uFF0C\u5E36\u8457\u4ED6\u7E9E\u5708\u5708\uFF0C\u76F4\u5230 Pip \u7684\u4E3B\u4EBA\u54ED\u8457\u8DD1\u904E\u4F86\u3002\u5979\u62B1\u7D27\u5169\u96BB\u72D7\u8AAA\uFF1A\u300CBuddy\uFF0C\u4F60\u771F\u662F\u5C0F\u82F1\u96C4\uFF01\u300DBuddy \u53EA\u662F\u6A56\u6A56\u7684\u651D\u7740\u5C3E\u5DF4\u3002'},
{id:8,tEn:'Buddy\u2019s Birthday Surprise',tZh:'Buddy \u7684\u751F\u65E5\u9A5A\u559C',cEn:'One morning, Buddy woke to find balloons everywhere! The kitchen smelled of peanut butter cake. His owner sang \u201CHappy Birthday\u201D and gave him a tiny paper crown. All his friends came: Miso the cat, Pip the puppy, even the old hound from down the street. They played till sunset. Best day ever.',cZh:'\u67D0\u5929\u65E9\u4E0A\uFF0CBuddy \u9192\u4F86\u767C\u73FE\u5230\u8655\u90FD\u662F\u6C23\u7403\uFF01\u5EDA\u623F\u98C4\u8457\u82B1\u751F\u9172\u86CB\u7CD5\u7684\u9999\u6C23\u3002\u4E3B\u4EBA\u5531\u8457\u300C\u751F\u65E5\u5FEB\u6A02\u300D\uFF0C\u9084\u70BA\u4ED6\u6234\u4E0A\u4E00\u9802\u5C0F\u5C0F\u7D19\u76AE\u7687\u51A0\u3002\u670B\u53CB\u5011\u90FD\u4F86\u4E86\uFF1A\u6A58\u8C93\u5473\u564C\u3001\u5C0F\u72D7 Pip\uFF0C\u9084\u6709\u8857\u4E0B\u90A3\u96BB\u8001\u7375\u72AC\u3002\u4ED6\u5011\u73A9\u5230\u5922\u967D\u897F\u4E0B\u3002\u9019\u662F\u6700\u68D2\u7684\u4E00\u5929\uFF01'},
{id:9,tEn:'The Beach Day',tZh:'\u6D77\u908A\u7684\u4E00\u5929',cEn:'Salty wind! Hot sand! Tall waves! Buddy had never seen the sea before. He barked at a wave, and the wave chased him back. He dug holes that filled with water. He met a crab, who pinched his nose (ouch!). On the way home he slept all the way, dreaming of tides.',cZh:'\u9E79\u9E79\u7684\u6D77\u98A8\uFF01\u71D9\u71D9\u7684\u6C99\u5B50\uFF01\u9AD8\u9AD8\u7684\u6D6A\u6D6A\uFF01Buddy \u5F9E\u6C92\u770B\u904E\u6D77\u3002\u4ED6\u5C0D\u8457\u6D6A\u82B1\u5927\u53EB\uFF0C\u6D6A\u82B1\u5C31\u8FFD\u5230\u4ED6\u8173\u908A\u3002\u4ED6\u5728\u6C99\u7058\u4E0A\u6316\u6D1E\uFF0C\u6D1E\u7ACB\u523B\u88AB\u6D77\u6C34\u586B\u6EFF\u3002\u4ED6\u9047\u5230\u4E00\u96BB\u87F9\uFF0C\u88AB\u5939\u4E86\u4E00\u4E0B\u9F3B\u5B50\uFF08\u597D\u75DB\uFF01\uFF09\u3002\u56DE\u5BB6\u7684\u8DEF\u4E0A\u4ED6\u4E00\u8DEF\u6C89\u6C89\u7761\u8457\uFF0C\u5922\u88E1\u90FD\u662F\u6F6E\u6C34\u3002'},
{id:10,tEn:'Sleepover at Grandma\u2019s',tZh:'\u53BB\u5976\u5976\u5BB6\u904E\u591C',cEn:'Grandma\u2019s house smelled of warm soup and old books. Buddy curled up on a soft rug near the fireplace. Grandma read him a story about a brave dog who sailed the seven seas. As the fire crackled, Buddy\u2019s eyelids grew heavy. He fell asleep knowing every home full of love feels exactly right.',cZh:'\u5976\u5976\u5BB6\u98C4\u8457\u6EAB\u6696\u6E6F\u548C\u820A\u66F8\u7684\u6C23\u5473\u3002Buddy \u6372\u7E2E\u5728\u58C1\u7210\u65C1\u8ED2\u8ED2\u7684\u5730\u6BEF\u4E0A\u3002\u5976\u5976\u5E6B\u4ED6\u5FF5\u4E86\u4E00\u672C\u6545\u4E8B\u66F8\uFF0C\u8B1B\u4E00\u96BB\u52C7\u6562\u7684\u72D7\u72D7\u822A\u884C\u4E86\u4E03\u500B\u5927\u6D77\u3002\u706B\u82B1\u566A\u5587\u4F5C\u97FF\uFF0CBuddy \u7684\u773C\u76AE\u8D8A\u4F86\u8D8A\u91CD\u3002\u4ED6\u9F61\u8457\u7761\u8457\u7740\uFF0C\u77E5\u9053\u6BCF\u4E00\u500B\u5145\u6EFF\u611B\u7684\u5BB6\uFF0C\u611F\u89BA\u90FD\u662F\u5C0D\u7684\u3002'}
];

function ac(){if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();return aCtx;}
function toggleSound(){soundOn=!soundOn;document.getElementById('sndTog').textContent=soundOn?'\u{1F50A}':'\u{1F507}';if(bgmGain)bgmGain.gain.value=soundOn?.06:0;if(soundOn&&!bgmOn)startBGM();}
function startBGM(){if(bgmOn)return;bgmOn=true;try{const c=ac();bgmGain=c.createGain();bgmGain.gain.value=soundOn?.06:0;bgmGain.connect(c.destination);const mel=[{n:392,d:.35},{n:440,d:.35},{n:523,d:.7},{n:440,d:.35},{n:392,d:.35},{n:330,d:.7},{n:349,d:.35},{n:392,d:.35},{n:440,d:.7},{n:392,d:.35},{n:349,d:.35},{n:330,d:.7},{n:392,d:.35},{n:523,d:.35},{n:659,d:.7},{n:523,d:.35},{n:440,d:.35},{n:392,d:1},{n:0,d:.5}];const tot=mel.reduce((s,n)=>s+n.d,0);function loop(){const c2=ac();let t=c2.currentTime+.05;mel.forEach(n=>{if(n.n>0){const o=c2.createOscillator(),g=c2.createGain();o.type='sine';o.connect(g);g.connect(bgmGain);o.frequency.setValueAtTime(n.n,t);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+n.d*.9);o.start(t);o.stop(t+n.d);}t+=n.d;});setTimeout(loop,tot*1000);}loop();}catch(e){}}
function snd(type){if(!soundOn)return;try{const c=ac(),t=c.currentTime;if(type==='check'){const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(660,t);o.frequency.exponentialRampToValueAtTime(1200,t+.08);g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);o.start(t);o.stop(t+.15);}else if(type==='uncheck'){const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(280,t+.1);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);o.start(t);o.stop(t+.15);}else if(type==='bone'){[523,659,784,1047].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(f,t+i*.06);g.gain.setValueAtTime(.2,t+i*.06);g.gain.exponentialRampToValueAtTime(.001,t+i*.06+.1);o.start(t+i*.06);o.stop(t+i*.06+.1);});}else if(type==='fanfare'){[523,659,784,880,1047,1175,1319,1047].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='triangle';o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(f,t+i*.1);g.gain.setValueAtTime(.15,t+i*.1);g.gain.exponentialRampToValueAtTime(.001,t+i*.1+.12);o.start(t+i*.1);o.stop(t+i*.1+.12);});}else if(type==='bark'){const buf=c.createBuffer(1,c.sampleRate*.15,c.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const src=c.createBufferSource();src.buffer=buf;const fl=c.createBiquadFilter();fl.type='bandpass';fl.frequency.value=500;fl.Q.value=2;const g=c.createGain();g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);src.connect(fl);fl.connect(g);g.connect(c.destination);src.start(t);src.stop(t+.2);}else if(type==='bark2'){const buf=c.createBuffer(1,c.sampleRate*.1,c.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const src=c.createBufferSource();src.buffer=buf;const fl=c.createBiquadFilter();fl.type='bandpass';fl.frequency.value=700;fl.Q.value=3;const g=c.createGain();g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);src.connect(fl);fl.connect(g);g.connect(c.destination);src.start(t);src.stop(t+.12);}else if(type==='pet'){[659,784,880,1047].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(f,t+i*.08);g.gain.setValueAtTime(.15,t+i*.08);g.gain.exponentialRampToValueAtTime(.001,t+i*.08+.12);o.start(t+i*.08);o.stop(t+i*.08+.12);});}else if(type==='place'){const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(523,t);o.frequency.setValueAtTime(784,t+.05);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);o.start(t);o.stop(t+.15);}else if(type==='streak'){[784,1047,1319,1568].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='triangle';o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(f,t+i*.07);g.gain.setValueAtTime(.2,t+i*.07);g.gain.exponentialRampToValueAtTime(.001,t+i*.07+.12);o.start(t+i*.07);o.stop(t+i*.07+.12);});}else if(type==='eat'){const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(330,t);o.frequency.setValueAtTime(550,t+.1);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.start(t);o.stop(t+.2);}else if(type==='correct'){[523,659,784].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(f,t+i*.08);g.gain.setValueAtTime(.2,t+i*.08);g.gain.exponentialRampToValueAtTime(.001,t+i*.08+.12);o.start(t+i*.08);o.stop(t+i*.08+.12);});}else if(type==='wrong'){const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(100,t+.2);g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.25);}}catch(e){}}

// ============= STATE =============
function load(){try{const d=localStorage.getItem('dogGame5');S=d?{...JSON.parse(JSON.stringify(DEF)),...JSON.parse(d)}:JSON.parse(JSON.stringify(DEF));}catch(e){S=JSON.parse(JSON.stringify(DEF));}if(!S.grid)S.grid=[];if(!S.backpack)S.backpack=[];while(S.backpack.length<S.bpSize)S.backpack.push(null);if(S.happiness==null)S.happiness=70;if(S.hunger==null)S.hunger=70;if(S.petCount==null)S.petCount=0;if(!S.lastDecay)S.lastDecay=todayKey();if(S.lang)curLang=S.lang;}
function save(){try{localStorage.setItem('dogGame5',JSON.stringify(S));}catch(e){}}
function todayKey(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;}
function todayRec(){const k=todayKey();if(!S.history[k])S.history[k]={habits:{},bonesEarned:0,completed:false};return S.history[k];}
function allHabits(){return[...S.mandHabits.map((n,i)=>({id:'m'+i,name:n,mandatory:true,bones:3})),...S.kidHabits.map((n,i)=>({id:'k'+i,name:n,mandatory:false,bones:2}))];}
function compPct(){const h=allHabits(),r=todayRec();if(!h.length)return 100;return Math.round(h.filter(x=>r.habits[x.id]).length/h.length*100);}
function bpFreeSlots(){return S.backpack.filter(x=>x===null).length;}
function bpUsed(){return S.backpack.filter(x=>x!==null).length;}
// ============= XP & LEVEL-UP =============
function gameXpField(type){return type===1?'mtXP':type===2?'maXP':'enXP';}
function gameLvField(type){return type===1?'mtLv':type===2?'maLv':'enLv';}
function gameLvLabel(type){return type===1?(T('mgT1')||'Mult'):type===2?(T('mgT2')||'Math'):(T('mgT0')||'English');}
function getCurLvInfo(type){const xp=S[gameXpField(type)]||0;const lv=getLvFromXp(xp);const info=xpToNextLv(xp);return {xp,lv,cur:info.cur,need:info.need,pct:info.pct};}
// addXP adds XP to a given game (0=en,1=mt,2=ma); returns true if leveled up
function addXP(type,amount){
  if(!amount)return false;
  if(S.activeEffects&&S.activeEffects.xpX2){amount*=2;S.activeEffects.xpX2=false;save();}
  const xpKey=gameXpField(type),lvKey=gameLvField(type);
  const oldLv=S[lvKey]||1;
  S[xpKey]=(S[xpKey]||0)+amount;
  const newLv=getLvFromXp(S[xpKey]);
  if(newLv>oldLv){
    S[lvKey]=newLv;
    // Queue a level-up celebration (may occur mid-game → show after current question cycle)
    pendingLevelUps.push({type,newLv,oldLv});
    return true;
  }
  S[lvKey]=newLv;
  return false;
}
let pendingLevelUps=[];
function triggerPendingLevelUps(){
  if(pendingLevelUps.length===0)return false;
  const lvUp=pendingLevelUps.shift();
  showLevelUpPopup(lvUp.type,lvUp.newLv,lvUp.oldLv);
  return true;
}
function pickRandomMystery(){
  const pool=MYSTERY_ITEMS.slice();
  // Weighted: common 50%, rare 35%, epic 15%
  const r=Math.random();
  let pick;
  if(r<.15){pick=pool.filter(x=>x.rarity==='epic');}
  else if(r<.50){pick=pool.filter(x=>x.rarity==='rare');}
  else{pick=pool.filter(x=>x.rarity==='common');}
  if(pick.length===0)pick=pool;
  return pick[Math.floor(Math.random()*pick.length)];
}
function showLevelUpPopup(type,newLv,oldLv){
  const bones=newLv*5; // LV2 gives 10, LV3 gives 15, LV4 gives 20...
  const mystery=pickRandomMystery();
  S.bones+=bones;S.totalBones+=bones;
  if(!S.mysteryOwned)S.mysteryOwned=[];
  S.mysteryOwned.push(mystery.id);
  // If backpack is full, auto-expand +4 slots as bonus
  let expanded=false;
  if(bpFreeSlots()===0){
    for(let i=0;i<4;i++)S.backpack.push(null);
    S.bpSize=(S.bpSize||4)+4;
    expanded=true;
  }
  const mystSlot=S.backpack.indexOf(null);
  if(mystSlot>=0)S.backpack[mystSlot]=mystery.id;
  save();
  const pop=document.getElementById('levelUpPopup');if(!pop)return;
  document.getElementById('luGameName').textContent=gameLvLabel(type);
  document.getElementById('luLvNum').textContent=newLv;
  document.getElementById('luBones').textContent='+'+bones;
  document.getElementById('luMysteryIcon').textContent=mystery.icon;
  document.getElementById('luMysteryName').textContent=curLang==='zh'?mystery.nameZh:mystery.nameEn;
  document.getElementById('luExpand').style.display=expanded?'block':'none';
  pop.classList.add('show');
  snd('levelup');
  updateHdr();if(typeof updateLvBar==='function')updateLvBar();
}
function closeLevelUpPopup(){
  const pop=document.getElementById('levelUpPopup');if(pop)pop.classList.remove('show');
  // Check if there are more queued level-ups
  setTimeout(()=>triggerPendingLevelUps(),300);
}
window.closeLevelUpPopup=closeLevelUpPopup;
function processDecay(){
  const now=Date.now();
  if(!S.lastTick)S.lastTick=now;
  const elapsedMin=Math.max(0,(now-S.lastTick)/60000);
  if(elapsedMin>=1){
    // decay 1 point per 6 min hunger, 1 per 8 min happiness while app open/offline
    const hDec=Math.floor(elapsedMin/6),pDec=Math.floor(elapsedMin/8);
    if(hDec>0)S.hunger=Math.max(0,S.hunger-hDec);
    if(pDec>0)S.happiness=Math.max(0,S.happiness-pDec);
    if(hDec>0||pDec>0)S.lastTick=now;
  }
  const today=todayKey();
  if(S.lastDecay!==today){
    const last=new Date(S.lastDecay),nowD=new Date(today);
    const days=Math.max(1,Math.round((nowD-last)/(864e5)));
    S.hunger=Math.max(0,S.hunger-25*days);
    S.happiness=Math.max(0,S.happiness-25*days);
    S.petCount=0;S.lastDecay=today;
    // Daily task slate: today's record starts fresh automatically via todayRec()
    save();
  }
}
// Periodic in-session decay tick (every 60s)
setInterval(()=>{if(S&&S.pinSetup){processDecay();if(typeof updatePetStats==='function')updatePetStats();}},60000);

function resizeScene(){const c=document.getElementById('sceneCanvas'),w=c.parentElement;const cw=w.clientWidth||300,ch=w.clientHeight||200;c.width=Math.max(cw*2,200);c.height=Math.max(ch*2,150);}
function getTimeOfDay(){const h=new Date().getHours();if(h>=6&&h<10)return'morning';if(h>=10&&h<17)return'day';if(h>=17&&h<20)return'evening';return'night';}
function drawScene(){
  const c=document.getElementById('sceneCanvas');if(!c)return;
  const ctx=c.getContext('2d'),W=c.width,H=c.height;ctx.clearRect(0,0,W,H);
  const tod=getTimeOfDay(),grassY=H*.5;
  // Sky
  const sky=ctx.createLinearGradient(0,0,0,grassY);
  if(tod==='morning'){sky.addColorStop(0,'#FFE4B5');sky.addColorStop(1,'#FFDAB9');}
  else if(tod==='day'){sky.addColorStop(0,'#87CEEB');sky.addColorStop(1,'#E0F7FA');}
  else if(tod==='evening'){sky.addColorStop(0,'#FF8C00');sky.addColorStop(1,'#FFB6C1');}
  else{sky.addColorStop(0,'#1a0a3e');sky.addColorStop(1,'#2d1b69');}
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,grassY);
  // Stars
  if(tod==='night'){ctx.fillStyle='rgba(255,255,220,.7)';let seed=42;for(let i=0;i<40;i++){seed=(seed*1664525+1013904223)&0xffffffff;const sx=Math.abs(seed)%W;seed=(seed*1664525+1013904223)&0xffffffff;const sy=Math.abs(seed)%(grassY);ctx.fillRect(sx,sy,2,2);}}
  // Sun/moon
  if(tod==='night'){ctx.fillStyle='#FFFACD';ctx.beginPath();ctx.arc(W*.85,H*.08,22,0,Math.PI*2);ctx.fill();}
  else{ctx.fillStyle=tod==='evening'?'#FF6347':'#FFD700';ctx.beginPath();ctx.arc(tod==='morning'?W*.15:W*.85,H*.1,25,0,Math.PI*2);ctx.fill();}
  // Clouds
  if(tod!=='night'){ctx.fillStyle='rgba(255,255,255,.7)';[[W*.2,H*.1,30],[W*.55,H*.06,40],[W*.8,H*.12,25]].forEach(([cx,cy,r])=>{ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.arc(cx+r*.7,cy-r*.2,r*.6,0,Math.PI*2);ctx.fill();});}
  // Ground
  const gnd=ctx.createLinearGradient(0,grassY,0,H);
  gnd.addColorStop(0,tod==='night'?'#1a3a1a':'#6BBF59');gnd.addColorStop(1,tod==='night'?'#0d200d':'#4A9B3F');
  ctx.fillStyle=gnd;ctx.fillRect(0,grassY,W,H-grassY);
  // Grid lines in place mode
  ctx.fillStyle=tod==='night'?'rgba(20,70,20,.6)':'rgba(50,140,60,.45)';let gseed=777;for(let i=0;i<60;i++){gseed=(gseed*1103515245+12345)&0x7fffffff;const gx=(gseed%1000)/1000*W;gseed=(gseed*1103515245+12345)&0x7fffffff;const gy=grassY+((gseed%1000)/1000)*(H-grassY);const gsz=2+((gseed>>10)%4);ctx.fillRect(gx,gy,gsz,gsz*2);}if(placeMode){ctx.strokeStyle='rgba(124,58,237,.5)';ctx.lineWidth=3;ctx.setLineDash([8,6]);ctx.strokeRect(2,grassY+4,W-4,H-grassY-8);ctx.setLineDash([]);}
  // Draw items sorted by Y for depth
  const drawList=[];
  S.grid.forEach(item=>{drawList.push({type:'deco',data:item,y:item.py});});
  drawList.push({type:'dog',y:dogY});
  drawList.sort((a,b)=>a.y-b.y);
  const decoScale=Math.min(W,H)*.14;
  const DECO_SCALE={tree:1.8,doghouse:1.6,pond:1.7,bench:1.4,lamp:1.5,fence:1.3,flower:.55,rock:.6};
  drawList.forEach(item=>{
    if(item.type==='deco'){
      const px=item.data.px*W, py=item.data.py*H;
      const mult=DECO_SCALE[item.data.id]||1;
      const depth=.75+((item.data.py-.5)/.5)*.5;
      drawDecoItem(ctx,item.data.id,px,py,decoScale*mult*depth,tod,item.data.lv||1);
    }else{
      const dx=dogX*W,dy=dogY*H;
      ctx.save();
      if(dogDir<0){ctx.translate(dx*2,0);ctx.scale(-1,1);}
      drawDog(ctx,S.breed,dx,dy,dogFrame,S.equipped,W*.0012,tod);
      if(dogState==='sleep'){ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('\u{1F4A4}\u{1F4A4}',dx,dy-W*.06);}
      ctx.restore();
      // Name tag
      ctx.fillStyle='rgba(255,255,255,.85)';ctx.beginPath();ctx.roundRect(dx-36,dy-W*.07,72,18,9);ctx.fill();
      ctx.fillStyle='#6d28d9';ctx.font='bold 10px Nunito';ctx.textAlign='center';ctx.fillText(S.dogName,dx,dy-W*.07+13);
    }
  });
  // Tint
  if(tod==='evening'){ctx.fillStyle='rgba(255,140,0,.08)';ctx.fillRect(0,0,W,H);}
  if(tod==='night'){ctx.fillStyle='rgba(0,0,30,.15)';ctx.fillRect(0,0,W,H);}
}
function drawDecoItem(ctx,type,x,y,s,tod,lv){
  lv=lv||1;
  ctx.fillStyle='rgba(0,0,0,.12)';ctx.beginPath();ctx.ellipse(x,y+s*.5,s*.6,s*.2,0,0,Math.PI*2);ctx.fill();
  if(type==='tree'){ctx.fillStyle='#5D4037';ctx.fillRect(x-s*.1,y-s*.1,s*.2,s*.7);ctx.fillStyle=tod==='night'?'#1B5E20':'#2E7D32';ctx.beginPath();ctx.arc(x,y-s*.4,s*.55,0,Math.PI*2);ctx.fill();ctx.fillStyle=tod==='night'?'#145214':'#388E3C';ctx.beginPath();ctx.arc(x+s*.15,y-s*.65,s*.4,0,Math.PI*2);ctx.fill();}
  else if(type==='fence'){ctx.fillStyle='#FAEBD7';ctx.fillRect(x-s*.6,y-s*.2,s*.12,s*.6);ctx.fillRect(x+s*.5,y-s*.2,s*.12,s*.6);ctx.fillRect(x-s*.6,y-s*.05,s*1.2,s*.08);ctx.fillRect(x-s*.6,y+s*.15,s*1.2,s*.08);}
  else if(type==='flower'){ctx.fillStyle='#228B22';ctx.fillRect(x-1,y,2,s*.3);const colors=['#FF69B4','#FFD700','#FF6347','#9370DB'];ctx.fillStyle=colors[Math.floor(x+y)%4];ctx.beginPath();ctx.arc(x,y-s*.05,s*.25,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(x,y-s*.05,s*.1,0,Math.PI*2);ctx.fill();}
  else if(type==='rock'){ctx.fillStyle='#9E9E9E';ctx.beginPath();ctx.ellipse(x,y+s*.1,s*.4,s*.25,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#BDBDBD';ctx.beginPath();ctx.ellipse(x-s*.08,y,s*.28,s*.16,-.2,0,Math.PI*2);ctx.fill();}
  else if(type==='bench'){ctx.fillStyle='#8D6E63';ctx.fillRect(x-s*.5,y-s*.1,s*1,s*.1);ctx.fillRect(x-s*.4,y,s*.08,s*.35);ctx.fillRect(x+s*.35,y,s*.08,s*.35);ctx.fillStyle='#A1887F';ctx.fillRect(x-s*.5,y-s*.3,s*1,s*.1);}
  else if(type==='lamp'){ctx.fillStyle='#616161';ctx.fillRect(x-s*.04,y-s*.6,s*.08,s*.9);ctx.fillStyle=tod==='night'?'#FFEB3B':'#FFC107';ctx.beginPath();ctx.arc(x,y-s*.7,s*.18,0,Math.PI*2);ctx.fill();if(tod==='night'){ctx.fillStyle='rgba(255,235,59,.12)';ctx.beginPath();ctx.arc(x,y-s*.7,s*.6,0,Math.PI*2);ctx.fill();}}
  else if(type==='doghouse'){
    if(lv>=3){
      // Mansion: large castle-like structure
      ctx.fillStyle='#FFE0B2';ctx.fillRect(x-s*.7,y-s*.35,s*1.4,s*.7);
      ctx.fillStyle='#7B1FA2';ctx.beginPath();ctx.moveTo(x-s*.8,y-s*.35);ctx.lineTo(x-s*.5,y-s*.9);ctx.lineTo(x-s*.2,y-s*.35);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(x+s*.2,y-s*.35);ctx.lineTo(x+s*.5,y-s*.9);ctx.lineTo(x+s*.8,y-s*.35);ctx.closePath();ctx.fill();
      ctx.fillStyle='#6A1B9A';ctx.beginPath();ctx.moveTo(x-s*.3,y-s*.35);ctx.lineTo(x,y-s*.75);ctx.lineTo(x+s*.3,y-s*.35);ctx.closePath();ctx.fill();
      ctx.fillStyle='#FFD700';ctx.fillRect(x-s*.08,y-s*.08,s*.16,s*.35);
      ctx.fillStyle='#4A148C';ctx.fillRect(x-s*.55,y-s*.15,s*.18,s*.18);ctx.fillRect(x+s*.37,y-s*.15,s*.18,s*.18);
    }else if(lv>=2){
      // Big doghouse: 2-room, bigger roof
      ctx.fillStyle='#FFCC80';ctx.fillRect(x-s*.6,y-s*.35,s*1.2,s*.7);
      ctx.fillStyle='#6D4C41';ctx.beginPath();ctx.moveTo(x-s*.72,y-s*.35);ctx.lineTo(x,y-s*.85);ctx.lineTo(x+s*.72,y-s*.35);ctx.closePath();ctx.fill();
      ctx.fillStyle='#3D1C02';ctx.beginPath();ctx.arc(x-s*.2,y+s*.05,s*.18,Math.PI,0);ctx.fillRect(x-s*.38,y+s*.05,s*.36,s*.3);ctx.fill();
      ctx.fillStyle='#90CAF9';ctx.fillRect(x+s*.18,y-s*.15,s*.28,s*.28);
      ctx.strokeStyle='#1976D2';ctx.lineWidth=2;ctx.strokeRect(x+s*.18,y-s*.15,s*.28,s*.28);
    }else{
      // Standard doghouse (original)
      ctx.fillStyle='#CD853F';ctx.fillRect(x-s*.45,y-s*.3,s*.9,s*.6);
      ctx.fillStyle='#8B4513';ctx.beginPath();ctx.moveTo(x-s*.55,y-s*.3);ctx.lineTo(x,y-s*.7);ctx.lineTo(x+s*.55,y-s*.3);ctx.fill();
      ctx.fillStyle='#3D1C02';ctx.beginPath();ctx.arc(x,y+s*.1,s*.15,Math.PI,0);ctx.fillRect(x-s*.15,y+s*.1,s*.3,s*.2);ctx.fill();
    }
  }
  else if(type==='pond'){ctx.fillStyle='rgba(30,136,229,.4)';ctx.beginPath();ctx.ellipse(x,y+s*.1,s*.55,s*.3,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.ellipse(x-s*.15,y,s*.12,s*.06,-.3,0,Math.PI*2);ctx.fill();}
}
function drawDog(ctx,breed,x,y,frame,eq,s,tod){
  // Simple, robust emoji-based rendering (works in all browsers/renderers)
  const br=BREEDS[breed]||BREEDS.shiba;
  const isW=dogState==='walk',isSl=dogState==='sleep';
  const bob=isW?Math.sin(frame*.5)*3*s:0;
  const size=Math.max(48,60*s);
  ctx.save();
  // Soft shadow under the dog
  ctx.fillStyle='rgba(0,0,0,.18)';ctx.beginPath();ctx.ellipse(x,y+size*.42,size*.35,size*.1,0,0,Math.PI*2);ctx.fill();
  // Colored circle backdrop (guarantees something visible even if emoji glyph is missing)
  ctx.fillStyle=br.body||'#F4A460';
  ctx.beginPath();ctx.arc(x,y+bob,size*.38,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=br.belly||'#FFF8DC';
  ctx.beginPath();ctx.arc(x,y+bob+size*.1,size*.25,0,Math.PI*2);ctx.fill();
  // Main emoji body on top
  ctx.font=size+'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#000';
  ctx.fillText(br.emoji||'\u{1F436}',x,y+bob);
  // Equipment emoji overlays
  if(eq){
    if(eq.head){const ei=EQUIP_ITEMS.find(e=>e.id===eq.head);if(ei){ctx.font=(size*.45)+'px sans-serif';ctx.fillText(ei.icon,x,y-size*.35+bob);}}
    if(eq.neck){const ei=EQUIP_ITEMS.find(e=>e.id===eq.neck);if(ei){ctx.font=(size*.35)+'px sans-serif';ctx.fillText(ei.icon,x,y+size*.05+bob);}}
    if(eq.body){const ei=EQUIP_ITEMS.find(e=>e.id===eq.body);if(ei){ctx.font=(size*.4)+'px sans-serif';ctx.fillText(ei.icon,x,y+size*.25+bob);}}
  }
  if(isSl){ctx.font=(size*.4)+'px sans-serif';ctx.fillStyle='#4c1d95';ctx.fillText('\u{1F4A4}',x+size*.4,y-size*.3+bob);}
  ctx.restore();
}

// ============= DOG AI =============
function updateDog(){
  dogFrame+=.12;dogStateTimer--;
  if(dogStateTimer<=0){const r=Math.random();if(r<.5){dogState='walk';dogStateTimer=120+Math.random()*180;dogTargetX=.1+Math.random()*.8;}else if(r<.75){dogState='sit';dogStateTimer=80+Math.random()*100;}else if(r<.9){dogState='idle';dogStateTimer=60+Math.random()*80;}else{dogState='sleep';dogStateTimer=100+Math.random()*120;}}
  if(dogState==='walk'){const dx=dogTargetX-dogX;if(Math.abs(dx)>.01){dogX+=Math.sign(dx)*.003;dogDir=dx>0?1:-1;}else{dogState='idle';dogStateTimer=40;}}
  dogIdleTimer++;
  if(dogIdleTimer>600&&Math.random()<.005){const m=T('bubbleMsgs');showBubble(m[Math.floor(Math.random()*m.length)]);dogIdleTimer=0;}
}
function showBubble(text){
  const b=document.getElementById('dogBubble'),bt=document.getElementById('bubbleText');
  bt.textContent=text;b.classList.add('show');
  const c=document.getElementById('sceneCanvas'),rect=c.parentElement;
  const px=dogX*rect.clientWidth,py=dogY*rect.clientHeight;
  b.style.left=Math.max(10,Math.min(px-60,rect.clientWidth-170))+'px';
  b.style.top=Math.max(10,py-80)+'px';snd('bark2');
}
document.getElementById('dogBubble').onclick=function(){this.classList.remove('show');};
function animLoop(){try{updateDog();drawScene();}catch(e){console.error('animLoop error:',e);}animId=requestAnimationFrame(animLoop);}

// ============= SCENE CLICK =============
document.getElementById('sceneCanvas').addEventListener('click',function(e){
  const rect=this.getBoundingClientRect();
  const nx=(e.clientX-rect.left)/rect.width, ny=(e.clientY-rect.top)/rect.height;
  if(ny<.5)return; // sky
  if(placeMode){
    // Check not too close to existing
    const DECO_HIT2={tree:.09,doghouse:.08,pond:.09,bench:.08,lamp:.08,fence:.07,flower:.035,rock:.04};
    const myHit=(DECO_HIT2[placeMode]||.06)*.7;
    const tooClose=S.grid.some(it=>{const otherHit=(DECO_HIT2[it.id]||.06)*.7;const minDist=myHit+otherHit;const dx=it.px-nx,dy=(it.py-ny)*1.5;return Math.sqrt(dx*dx+dy*dy)<minDist;});
    if(tooClose){snd('uncheck');const ind=document.getElementById('placeInd');ind.textContent=T('tooClose')||'Too close!';setTimeout(()=>{ind.textContent=T('placeHint');},1500);return;}
    const gridItem={id:placeMode,px:nx,py:ny};
    if(placeMode==='doghouse')gridItem.lv=window._pendingLv||S.doghouseLv||1;
    window._pendingLv=null;
    S.grid.push(gridItem);
    if(placeBpIdx>=0&&placeBpIdx<S.backpack.length)S.backpack[placeBpIdx]=null;
    snd('place');placeMode=null;placeBpIdx=-1;
    document.getElementById('placeInd').classList.remove('show');
    save();updateHdr();return;
  }
  // Check dog click
  const dist=Math.sqrt((nx-dogX)**2+(ny-dogY)**2);
  if(dist<.08){petDog();return;}
  // Check deco click
  const DECO_HIT={tree:.09,doghouse:.08,pond:.09,bench:.08,lamp:.08,fence:.07,flower:.035,rock:.04};
  const sorted=[...S.grid].sort((a,b)=>b.py-a.py);
  const clicked=sorted.find(it=>{const hit=DECO_HIT[it.id]||.06;return Math.abs(it.px-nx)<hit&&Math.abs(it.py-ny)<hit;});
  if(clicked){
    const dn=getItemName(clicked.id);
    // OK = move (pick up), Cancel = show remove confirm
    const wantMove=confirm((T('decoAction')||'What to do with {name}?').replace('{name}',dn)+'\n\n'+T('decoMove')+' = OK\n'+T('decoRemove')+' = '+T('decoCancel'));
    if(wantMove){
      // Enter move mode — remove from grid, enter placeMode
      placeMode=clicked.id;placeBpIdx=-1;
      if(clicked.lv)window._pendingLv=clicked.lv;
      S.grid=S.grid.filter(it=>it!==clicked);
      document.getElementById('placeInd').classList.add('show');
      document.getElementById('placeInd').textContent=T('placeHint');
      snd('check');save();
    }else{
      if(confirm(T('removeConfirm').replace('{name}',dn))){S.grid=S.grid.filter(it=>it!==clicked);snd('place');save();}
    }
  }
});
function petDog(){
  snd('pet');dogState='idle';dogStateTimer=60;
  if(S.petCount<2){S.petCount++;S.happiness=Math.min(100,S.happiness+10);S.bones+=1;S.totalBones+=1;save();updateHdr();updatePetStats();showBubble(T('petMsg1'));}
  else showBubble(T('petMaxed'));
  const rect=document.getElementById('sceneCanvas').parentElement.getBoundingClientRect();
  const px=rect.left+dogX*rect.width,py=rect.top+dogY*rect.height;
  for(let i=0;i<6;i++){setTimeout(()=>{const e=document.createElement('div');e.className='particle2';e.textContent='\u2764\uFE0F';e.style.left=(px+Math.random()*60-30)+'px';e.style.top=(py+Math.random()*30)+'px';e.style.setProperty('--tx',(Math.random()-.5)*80+'px');e.style.setProperty('--ty',-(30+Math.random()*60)+'px');document.body.appendChild(e);setTimeout(()=>e.remove(),1500);},i*60);}
}

// ============= TIMER & LOCK =============
function startTimer(){timerSec=900;clearInterval(sessionTimer);sessionTimer=setInterval(()=>{timerSec--;const m=Math.floor(timerSec/60),ss=timerSec%60;const el=document.getElementById('timerDisp');if(el)el.textContent=`${m}:${String(ss).padStart(2,'0')}`;if(timerSec<=0){clearInterval(sessionTimer);showTimeLock();}},1000);}
function showTimeLock(){if(checkNightLock())return;showLock(T('breakTime'),T('breakMsg'),true);}
function checkNightLock(){const h=new Date().getHours();if(h>=22||h<7){showLock(T('bedtime'),h>=22?T('bedtimeMsg'):T('morningMsg'),false);return true;}return false;}
function showLock(title,info,wait){document.getElementById('lockTitle').textContent=title;document.getElementById('lockInfo').textContent=info;document.getElementById('lockWait').style.display=wait?'block':'none';document.getElementById('lockOv').classList.add('show');document.getElementById('lockCancelBtn').style.display='none';pinBuf='';pinMode='lock';updateLockDots();if(wait)startWaitCD();}
function startWaitCD(){let sec=900;clearInterval(waitTimer);waitTimer=setInterval(()=>{sec--;document.getElementById('lockWaitTime').textContent=`${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}`;if(sec<=0){clearInterval(waitTimer);closeLockOv();startTimer();}},1000);}
function closeLockOv(){document.getElementById('lockOv').classList.remove('show');clearInterval(waitTimer);}
function updateLockDots(){const dots=document.getElementById('lPinDots').children;for(let i=0;i<4;i++)dots[i].classList.toggle('on',i<pinBuf.length);}

// ============= SETUP =============
function initSetup(){
  if(S.pinSetup){document.getElementById('setupOv').classList.remove('show');document.getElementById('gameWrap').style.display='grid';return false;}
  const g=document.getElementById('breedGrid');g.innerHTML='';
  Object.entries(BREEDS).forEach(([k,v])=>{const d=document.createElement('div');d.className='breed-card';d.innerHTML=`<span class="emoji">${v.emoji}</span><div class="bname">${(T('breedN')||{})[k]||k}</div><div class="bdesc">${(T('breedD')||{})[k]||''}</div>`;d.onclick=()=>{g.querySelectorAll('.breed-card').forEach(c=>c.classList.remove('sel'));d.classList.add('sel');S.breed=k;document.getElementById('sNext1').disabled=false;};g.appendChild(d);});
  const pd=document.getElementById('sPinDots');pd.innerHTML='';for(let i=0;i<4;i++){const d=document.createElement('div');d.className='pin-d';pd.appendChild(d);}
  const np=document.getElementById('sNumpad');np.innerHTML='';
  [1,2,3,4,5,6,7,8,9,T('clear'),0,'\u2713'].forEach(v=>{const b=document.createElement('button');b.className='nk';b.textContent=v;b.onclick=()=>{if(v===T('clear')){pinBuf='';updSetupDots();}else if(v==='\u2713')submitSetupPin();else if(pinBuf.length<4){pinBuf+=v;updSetupDots();}};np.appendChild(b);});
  return true;
}
function updSetupDots(){const d=document.getElementById('sPinDots').children;for(let i=0;i<4;i++)d[i].classList.toggle('on',i<pinBuf.length);}
function setupStep(n){document.querySelectorAll('.setup-step').forEach(s=>s.classList.remove('active'));document.getElementById('ss'+n).classList.add('active');if(n===2)document.getElementById('sEmoji').textContent=BREEDS[S.breed].emoji;if(n===3){pinBuf='';pinStep=0;setupPin1='';document.getElementById('sPinMsg').textContent=T('enter4');updSetupDots();}}
function submitSetupPin(){if(pinBuf.length!==4){document.getElementById('sPinMsg').textContent=T('enter4');return;}if(pinStep===0){setupPin1=pinBuf;pinBuf='';pinStep=1;document.getElementById('sPinMsg').textContent=T('reenter');updSetupDots();}else{if(pinBuf===setupPin1){S.pin=pinBuf;S.pinSetup=true;S.dogName=document.getElementById('sName').value.trim()||'Buddy';save();document.getElementById('setupOv').classList.remove('show');document.getElementById('gameWrap').style.display='grid';startGame();}else{document.getElementById('sPinMsg').textContent=T('mismatch');pinBuf='';pinStep=0;setupPin1='';updSetupDots();}}}
