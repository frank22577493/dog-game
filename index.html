function showTutorial(){if(S.tutDone)return;tutIdx=0;document.getElementById('tutOv').classList.add('show');showTutStep();}
function showTutStep(){const s=T('tutSteps')[tutIdx];document.getElementById('tutEmoji').textContent=s.e;document.getElementById('tutTitle').textContent=s.t;document.getElementById('tutText').textContent=s.p;document.getElementById('tutBtn').textContent=T('gotIt');}
function nextTut(){snd('check');tutIdx++;if(tutIdx>=T('tutSteps').length){document.getElementById('tutOv').classList.remove('show');S.tutDone=true;save();}else showTutStep();}

// ============= HABITS =============
function renderHabits(){
  const r=todayRec(),hs=allHabits(),el=document.getElementById('habitList');el.innerHTML='';
  hs.forEach(h=>{const done=!!r.habits[h.id],bn=Math.round(h.bones*(S.mult||1));
    const d=document.createElement('div');d.className='habit2'+(done?' done':'')+(h.mandatory?' mandatory':'');d.onclick=()=>toggleH(h.id,h);
    d.innerHTML=`<div class="hcb2">${done?'\u2713':''}</div><div class="htxt2">${h.name}</div><div class="hbone2">\u{1F9B4}${bn}</div>`;el.appendChild(d);});
  if(r.completed&&compPct()<100){r.completed=false;save();}
  document.getElementById('completeBtn').style.display=(compPct()===100&&!r.completed)?'block':'none';
  updateBars();updateProg();updateWeekly();updatePetStats();
}
function toggleH(id,h){
  const r=todayRec();if(r.completed)return;const was=!!r.habits[id],bn=Math.round(h.bones*(S.mult||1));r.habits[id]=!was;
  if(!was){if(S.activeEffects&&S.activeEffects.bonusX2Date===todayKey())bn*=2;S.bones+=bn;S.totalBones+=bn;r.bonesEarned=(r.bonesEarned||0)+bn;snd('check');floatBone(bn);
    const m=T('habitReacts');setTimeout(()=>{showBubble(m[Math.floor(Math.random()*m.length)]);},300);
  }else{S.bones=Math.max(0,S.bones-bn);S.totalBones=Math.max(0,S.totalBones-bn);r.bonesEarned=Math.max(0,(r.bonesEarned||0)-bn);snd('uncheck');}
  save();renderHabits();updateHdr();
}
function floatBone(n){const e=document.createElement('div');e.className='float-bone2';e.textContent=`\u{1F9B4}+${n}`;e.style.left=(window.innerWidth/2+Math.random()*100)+'px';e.style.top=(window.innerHeight/2)+'px';document.body.appendChild(e);setTimeout(()=>e.remove(),1500);}
function updateBars(){
  const p=compPct();updatePetStats();
  const m=T('dogMsgs');let mk=0;if(p>=100)mk=100;else if(p>=90)mk=90;else if(p>=60)mk=60;else if(p>=30)mk=30;const ms=m[mk];
  document.getElementById('dogSay').textContent='\u{1F43E} '+ms[Math.floor(Math.random()*ms.length)];
}
function updateProg(){const hs=allHabits(),r=todayRec(),done=hs.filter(x=>r.habits[x.id]).length,total=hs.length;let m='';if(r.completed)m=T('alreadyDone');else if(!done)m=T('notStarted');else if(done<total)m=T('partial').replace('{d}',done).replace('{t}',total);else m=T('allComplete');document.getElementById('progMsg').textContent=m;}
function updateHdr(){const $=id=>document.getElementById(id);const set=(id,v)=>{const el=$(id);if(el)el.textContent=v;};set('boneC',S.bones);set('streakC',S.streak);set('shopBoneC',S.bones);set('streakD',S.streak);S.totalDays=Object.values(S.history).filter(x=>x.completed).length;set('bpCount',`${bpUsed()}/${S.bpSize}`);}
function updateWeekly(){const now=new Date(),dow=now.getDay(),ws=new Date(now);ws.setDate(now.getDate()-dow);let c=0;for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;if(S.history[k]&&S.history[k].completed)c++;}document.getElementById('wkChallenge').innerHTML=c>=7?T('wkDone'):T('wkChallenge').replace('{n}',c)+`<div class="wk-prog"><div class="wk-fill" style="width:${Math.round(c/7*100)}%"></div></div>`;}

// ============= STREAK & STAGE =============
function calcStreak(){let streak=0,ck=todayKey();for(let i=0;i<365;i++){const rec=S.history[ck];if(rec&&rec.completed){streak++;const d=new Date(ck);d.setDate(d.getDate()-1);ck=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}else if(i===0){const d=new Date(ck);d.setDate(d.getDate()-1);ck=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}else break;}S.streak=streak;if(streak>S.bestStreak)S.bestStreak=streak;}
function updateStage(){const cd=S.totalDays;let ns=0;if(cd>=STAGES[0].need+STAGES[1].need)ns=2;else if(cd>=STAGES[0].need)ns=1;if(ns>S.stage){S.stage=ns;setTimeout(()=>alert(T('stageUp').replace('{s}',T('stages')[ns])),500);}}
function checkAch(){ACHS.forEach(a=>{if(!S.achievements[a.id]&&a.c(S)){S.achievements[a.id]=true;}});save();}

// ============= CELEBRATION =============
function calcStreakBonus(streak){
  if(streak>=30)return 30;if(streak>=14)return 20;if(streak>=7)return 10;if(streak>=3)return 5;if(streak>=2)return 3;return 0;
}
function streakNextTierInfo(streak){
  const tiers=[{days:2,bonus:3},{days:3,bonus:5},{days:7,bonus:10},{days:14,bonus:20},{days:30,bonus:30}];
  for(const t of tiers){if(streak<t.days)return{nextBonus:t.bonus,daysNeeded:t.days-streak};}
  return null;
}
document.getElementById('completeBtn').onclick=function(){
  const r=todayRec();if(r.completed)return;r.completed=true;calcStreak();
  const bonus=calcStreakBonus(S.streak);
  if(bonus){S.bones+=bonus;S.totalBones+=bonus;}document.getElementById('celStreak').style.display='none';
  S.happiness=Math.min(100,S.happiness+15);
  updateStage();checkAch();document.getElementById('celBones').textContent=r.bonesEarned+(bonus?` +${bonus}`:'');
  const cm=T('celMsgs');document.getElementById('celMsg').textContent=cm[Math.floor(Math.random()*cm.length)];
  document.getElementById('celOv').classList.add('show');snd('fanfare');setTimeout(()=>snd('bark'),600);
  for(let i=0;i<20;i++)setTimeout(()=>{const e=document.createElement('div');e.className='particle2';e.textContent=['\u{1F9B4}','\u2B50','\u{1F389}','\u2728','\u{1F495}','\u{1F43E}'][Math.floor(Math.random()*6)];e.style.left=(20+Math.random()*60)+'%';e.style.top=(20+Math.random()*50)+'%';e.style.setProperty('--tx',(Math.random()-.5)*250+'px');e.style.setProperty('--ty',-(60+Math.random()*150)+'px');document.body.appendChild(e);setTimeout(()=>e.remove(),1500);},i*40);
  window._pendingStreakBonus={streak:S.streak,bonus};
  save();renderHabits();updateHdr();
};
function closeCel(){
  document.getElementById('celOv').classList.remove('show');
  const sb=window._pendingStreakBonus;
  if(sb&&sb.bonus>0){window._pendingStreakBonus=null;setTimeout(()=>showStreakPopup(sb.streak,sb.bonus),300);}
  else{window._pendingStreakBonus=null;}
}
function showStreakPopup(streak,bonus){
  const zh=curLang==='zh';
  const pop=document.getElementById('streakBonusPopup');if(!pop)return;
  let icon='\uD83D\uDD25';
  if(streak>=30)icon='\uD83D\uDC51';else if(streak>=14)icon='\uD83C\uDF1F';else if(streak>=7)icon='\u26A1';
  document.getElementById('sbpFlame').textContent=icon;
  document.getElementById('sbpTitle').textContent=zh?'\u9023\u7e8c\u7c3d\u5230\u734e\u52f5\uff01':'Streak Bonus!';
  document.getElementById('sbpDays').textContent=zh?`\u9023\u7e8c ${streak} \u5929\uff01\uD83D\uDC4F`:`${streak} days in a row! \uD83D\uDC4F`;
  document.getElementById('sbpBonus').textContent=`+${bonus} \uD83E\uDDB4`;
  document.getElementById('sbpBonusLbl').textContent=zh?'\u984d\u5916\u9aa8\u982d\u734e\u52f5':'bonus bones earned!';
  const next=streakNextTierInfo(streak);
  const nextEl=document.getElementById('sbpNext');
  if(next){nextEl.textContent=zh?`\u518d\u5835 ${next.daysNeeded} \u5929\u5c31\u80fd\u5347\u5230 +${next.nextBonus} \u9aa8\u982d\u7b49\u7d1a\uff01\uD83D\uDE80`:`${next.daysNeeded} more day${next.daysNeeded>1?'s':''} to reach +${next.nextBonus} bonus tier! \uD83D\uDE80`;}
  else{nextEl.textContent=zh?'\uD83D\uDC51 \u5df2\u9054\u6700\u9ad8\u7b49\u7d1a\uff01':'\uD83D\uDC51 MAX TIER - You\'re legendary!';}
  document.getElementById('sbpCloseBtn').textContent=zh?'\u592a\u68d2\u4e86\uff01\uD83E\uDD73':'Awesome! \uD83E\uDD73';
  pop.style.display='flex';snd('streak');
}
function closeStreakPopup(){const pop=document.getElementById('streakBonusPopup');if(pop)pop.style.display='none';}
window.closeStreakPopup=closeStreakPopup;

// ============= SHOP (fixed purchase logic) =============
function renderShop(){
  const el=document.getElementById('shopContent');el.innerHTML='';document.getElementById('shopBoneC').textContent=S.bones;
  const noSpace=bpFreeSlots()===0;
  // Accessories
  addCat(el,T('catAccessories'));
  const eg=document.createElement('div');eg.className='shop-grid2';
  EQUIP_ITEMS.forEach(item=>{
    const own=S.backpack.includes(item.id)||Object.values(S.equipped).includes(item.id);
    const p=Math.round(item.price*(S.mult||1));
    let reason='',reasonCls='';if(!own){if(noSpace){reason=T('bpFull');reasonCls='bpfull';}else if(S.bones<p)reason=T('noMoney');}
    const can=!own&&!noSpace&&S.bones>=p;
    const d=document.createElement('div');d.className='shop-card'+(reason?' cannot':'');
    d.innerHTML=`<span class="sc-icon">${item.icon}</span><div class="sc-name">${(T('equipN')||{})[item.id]||item.id}</div><div class="sc-price">${own?T('owned'):'\u{1F9B4} '+p}</div>${reason?('<div class="sc-reason '+reasonCls+'"'+(reasonCls==='bpfull'?' onclick="openBP()"':'')+'>'+reason+'</div>'):''}`;
    if(!own){if(noSpace&&S.bones>=p){const btn=document.createElement('button');btn.className='shop-btn2 bag-open';btn.textContent=T('openBag')||T('bag');btn.onclick=e=>{e.stopPropagation();openBP();};d.appendChild(btn);}else{const btn=document.createElement('button');btn.className='shop-btn2';btn.disabled=!can;btn.textContent=T('buy');btn.onclick=e=>{e.stopPropagation();buyEquip(item.id,p);};d.appendChild(btn);}}
    eg.appendChild(d);});
  el.appendChild(eg);
  // Toys
  addCat(el,T('catToys'));
  const tg=document.createElement('div');tg.className='shop-grid2';
  TOY_ITEMS.forEach(item=>{
    const own=S.backpack.includes(item.id);
    const p=Math.round(item.price*(S.mult||1));
    let reason='',reasonCls='';if(!own){if(noSpace){reason=T('bpFull');reasonCls='bpfull';}else if(S.bones<p)reason=T('noMoney');}
    const can=!own&&!noSpace&&S.bones>=p;
    const d=document.createElement('div');d.className='shop-card'+(reason?' cannot':'');
    d.innerHTML=`<span class="sc-icon">${item.icon}</span><div class="sc-name">${(T('toyN')||{})[item.id]||item.id}</div><div class="sc-desc">\u{1F496}+${item.boost}</div><div class="sc-price">${own?T('owned'):'\u{1F9B4} '+p}</div>${reason?('<div class="sc-reason '+reasonCls+'"'+(reasonCls==='bpfull'?' onclick="openBP()"':'')+'>'+reason+'</div>'):''}`;
    if(!own){if(noSpace&&S.bones>=p){const btn=document.createElement('button');btn.className='shop-btn2 bag-open';btn.textContent=T('openBag')||T('bag');btn.onclick=e=>{e.stopPropagation();openBP();};d.appendChild(btn);}else{const btn=document.createElement('button');btn.className='shop-btn2';btn.disabled=!can;btn.textContent=T('buy');btn.onclick=e=>{e.stopPropagation();buyEquip(item.id,p);};d.appendChild(btn);}}
    tg.appendChild(d);});
  el.appendChild(tg);
  // Decorations (no backpack!)
  addCat(el,T('catDecorations'));
  const dg=document.createElement('div');dg.className='shop-grid2';
  DECO_ITEMS.forEach(item=>{
    // Doghouse tiered upgrade: Lv 1 -> 2 -> 3 (mansion); max out after Lv 3
    let icon=item.icon,name=(T('decoN')||{})[item.id]||item.id,basePrice=item.price,maxedOut=false;
    if(item.id==='doghouse'){
      const nextLv=(S.doghouseLv||0)+1;
      if(nextLv===1){icon='\u{1F3E0}';name=T('dhTier1')||name;basePrice=60;}
      else if(nextLv===2){icon='\u{1F3E1}';name=T('dhTier2')||name;basePrice=120;}
      else if(nextLv===3){icon='\u{1F3F0}';name=T('dhTier3')||name;basePrice=250;}
      else {icon='\u{1F3F0}';name=T('dhTier3')||name;basePrice=0;maxedOut=true;}
    }
    const p=Math.round(basePrice*(S.mult||1)),can=!maxedOut&&S.bones>=p&&bpFreeSlots()>0;
    const d=document.createElement('div');d.className='shop-card'+(maxedOut?' cannot':'');
    const reason=maxedOut?T('dhMax'):(bpFreeSlots()===0?T('bpFull'):(S.bones<p?T('noMoney'):''));
    d.innerHTML=`<span class="sc-icon">${icon}</span><div class="sc-name">${name}</div><div class="sc-price">${maxedOut?T('owned'):('\u{1F9B4} '+p)}</div>${reason?('<div class="sc-reason">'+reason+'</div>'):''}`;
    if(!maxedOut){const btn=document.createElement('button');btn.className='shop-btn2';btn.disabled=!can;btn.textContent=T('buy');btn.onclick=e=>{e.stopPropagation();buyDeco(item.id,p);};d.appendChild(btn);}
    dg.appendChild(d);});
  el.appendChild(dg);
  // Food
  addCat(el,T('catFood'));
  const fg=document.createElement('div');fg.className='shop-grid2';
  FOOD_ITEMS.forEach(item=>{
    const p=Math.round(item.price*(S.mult||1)),can=S.bones>=p;
    const d=document.createElement('div');d.className='shop-card';
    d.innerHTML=`<span class="sc-icon">${item.icon}</span><div class="sc-name">${(T('foodN')||{})[item.id]||item.id}</div><div class="sc-desc">\u{1F356}+${item.boost}</div><div class="sc-price">\u{1F9B4} ${p}</div>`;
    const btn=document.createElement('button');btn.className='shop-btn2';btn.disabled=!can;btn.textContent=T('buy');btn.onclick=e=>{e.stopPropagation();buyFood(item,p);};d.appendChild(btn);
    fg.appendChild(d);});
  el.appendChild(fg);
  // Services
  addCat(el,T('catServices'));
  const sg=document.createElement('div');sg.className='shop-grid2';
  SERVICE_ITEMS.forEach(item=>{
    const p=Math.round(item.price*(S.mult||1)),can=S.bones>=p;
    const d=document.createElement('div');d.className='shop-card';
    d.innerHTML=`<span class="sc-icon">${item.icon}</span><div class="sc-name">${(T('serviceN')||{})[item.id]||item.id}</div><div class="sc-desc">\u{1F496}+${item.boost}</div><div class="sc-price">\u{1F9B4} ${p}</div>`;
    const btn=document.createElement('button');btn.className='shop-btn2';btn.disabled=!can;btn.textContent=T('buy');btn.onclick=e=>{e.stopPropagation();buyService(item,p);};d.appendChild(btn);
    sg.appendChild(d);});
  el.appendChild(sg);
}
function addCat(el,t){const d=document.createElement('div');d.className='shop-cat';d.textContent=t;el.appendChild(d);}
function buyEquip(id,price){if(bpFreeSlots()===0||S.bones<price)return;S.bones-=price;const slot=S.backpack.indexOf(null);S.backpack[slot]=id;snd('bone');save();renderShop();updateHdr();renderBP();}
function buyDeco(id,price){
  if(S.bones<price)return;
  if(id==='doghouse'){
    if((S.doghouseLv||0)>=3)return;
    // Remove any existing doghouse from yard and backpack, then upgrade level
    S.grid=S.grid.filter(it=>it.id!=='doghouse');
    for(let i=0;i<S.backpack.length;i++)if(S.backpack[i]==='doghouse')S.backpack[i]=null;
    S.doghouseLv=(S.doghouseLv||0)+1;
    if(bpFreeSlots()===0)return; // should not happen after clearing
    S.bones-=price;
    const slot=S.backpack.indexOf(null);S.backpack[slot]=id;
    snd('bone');save();renderShop();updateHdr();renderBP();return;
  }
  if(bpFreeSlots()===0)return;
  S.bones-=price;
  const slot=S.backpack.indexOf(null);S.backpack[slot]=id;
  snd('bone');save();renderShop();updateHdr();renderBP();
}
function buyFood(item,price){
  if(S.bones<price)return;S.bones-=price;
  S.hunger=Math.min(100,S.hunger+item.boost);
  showBubble(T('feedResult').replace('{name}',(T('foodN')||{})[item.id]||'').replace('{n}',item.boost));
  snd('eat');save();renderShop();updateHdr();updatePetStats();
}
function buyService(item,price){
  if(S.bones<price)return;S.bones-=price;
  S.happiness=Math.min(100,S.happiness+item.boost);
  showBubble(T('serviceResult').replace('{name}',(T('serviceN')||{})[item.id]||'').replace('{n}',item.boost));
  snd('pet');save();renderShop();updateHdr();updatePetStats();
}

// ============= BACKPACK POPUP =============
function openBP(){document.getElementById('bpPopup').classList.add('show');selectedBpIdx=-1;renderBP();}
function closeBP(){document.getElementById('bpPopup').classList.remove('show');}
function renderBP(){
  const el=document.getElementById('bpSlots');el.innerHTML='';
  document.getElementById('bpTitle').textContent=T('bag')+` (${bpUsed()}/${S.bpSize})`;
  let hint=document.getElementById('bpFullHint');
  if(bpFreeSlots()===0){if(!hint){hint=document.createElement('div');hint.id='bpFullHint';hint.style.cssText='background:#fef3c7;color:#b45309;border:2px solid #fcd34d;border-radius:12px;padding:8px 10px;font-size:13px;font-weight:700;text-align:center;margin-bottom:8px;';el.parentElement.insertBefore(hint,el);}hint.textContent=T('bpFullHint');hint.style.display='block';}else if(hint){hint.style.display='none';}
  for(let i=0;i<S.bpSize;i++){
    const item=S.backpack[i],d=document.createElement('div');
    d.className='bp-slot'+(item?' filled':'');
    const isEq=item&&Object.values(S.equipped).includes(item);
    if(isEq){d.classList.add('equipped');d.innerHTML=`${getIcon(item)}<span class="eq-dot"></span>`;}
    else if(item)d.innerHTML=`${getIcon(item)}`;
    d.onclick=()=>{if(!item)return;bpAction(i,item);};
    el.appendChild(d);
  }
  const cost=S.bpSize<8?50:S.bpSize<12?100:200;
  const btn=document.getElementById('bpExpandBtn');
  if(S.bpSize>=16)btn.style.display='none';
  else{btn.style.display='';btn.textContent=T('expand').replace('{c}',cost);btn.disabled=S.bones<cost;}
  document.getElementById('bpSelInfo').style.display='none';
  document.getElementById('bpCount').textContent=`${bpUsed()}/${S.bpSize}`;
}
function getIcon(id){
  const mysI=MYSTERY_ITEMS.find(x=>x.id===id);if(mysI)return mysI.icon;const ei=EQUIP_ITEMS.find(e=>e.id===id);if(ei)return ei.icon;const ti=TOY_ITEMS.find(t=>t.id===id);if(ti)return ti.icon;if(id==='doghouse'){const lv=S.doghouseLv||1;return lv>=3?'\u{1F3F0}':lv>=2?'\u{1F3E1}':'\u{1F3E0}';}const di=DECO_ITEMS.find(d=>d.id===id);if(di)return di.icon;return'?';}
function getItemName(id){
  const mysN=MYSTERY_ITEMS.find(x=>x.id===id);if(mysN)return curLang==='zh'?mysN.nameZh:mysN.nameEn;if(id==='doghouse'){const lv=S.doghouseLv||1;return lv>=3?T('dhTier3'):lv>=2?T('dhTier2'):T('dhTier1');}return(T('equipN')||{})[id]||(T('toyN')||{})[id]||(T('decoN')||{})[id]||id;}
function bpAction(idx,id){
  // Mystery item
  const isMystery=MYSTERY_ITEMS.find(x=>x.id===id);
  if(isMystery){
    const meta2=getMysteryMeta(id);
    const nameM=curLang==='zh'?isMystery.nameZh:isMystery.nameEn;
    const effTxt=meta2.type==='consumable'?(curLang==='zh'?meta2.effectZh:meta2.effectEn):(curLang==='zh'?'可放置於院子裡裝飾':'Place in yard as decoration');
    const info=document.getElementById('bpSelInfo');if(info)info.textContent=nameM+': '+effTxt;
    if(meta2.type==='consumable'){
      if(confirm((curLang==='zh'?'使用 ':'Use ')+nameM+'?'))useMysteryItem(id,idx);
    }else{
      if(confirm((curLang==='zh'?'放到院子裡？':'Place in yard? ')+nameM)){
        placeMode=id;placeBpIdx=idx;document.getElementById('bpPopup').classList.remove('show');
        document.getElementById('placeInd').classList.add('show');document.getElementById('placeInd').textContent=T('placeHint');
      }
    }
    return;
  }
  const isEquip=EQUIP_ITEMS.find(e=>e.id===id);
  const isToy=TOY_ITEMS.find(t=>t.id===id);
  const isDeco=DECO_ITEMS.find(d=>d.id===id);
  const info=document.getElementById('bpSelInfo');
  info.style.display='block';
  info.innerHTML='';
  const name=getItemName(id);
  const label=document.createElement('div');label.textContent=getIcon(id)+' '+name;label.style.marginBottom='6px';info.appendChild(label);
  if(isEquip){
    const isOn=S.equipped[isEquip.slot]===id;
    const eBtn=document.createElement('button');eBtn.className='bp-act-btn';eBtn.style.background=isOn?'#6b7280':'linear-gradient(135deg,#7c3aed,#6d28d9)';
    eBtn.textContent=T('equipTxt');eBtn.onclick=()=>{if(isOn)S.equipped[isEquip.slot]=null;else S.equipped[isEquip.slot]=id;snd('check');save();renderBP();};
    info.appendChild(eBtn);
  }
  if(isToy){
    const uBtn=document.createElement('button');uBtn.className='bp-act-btn';uBtn.style.background='linear-gradient(135deg,#10b981,#059669)';
    uBtn.textContent=T('useTxt');uBtn.onclick=()=>{S.happiness=Math.min(100,S.happiness+isToy.boost);showBubble(T('toyResult').replace('{name}',name).replace('{n}',isToy.boost));snd('pet');save();updatePetStats();renderBP();};
    info.appendChild(uBtn);
  }
  if(isDeco){
    const pBtn=document.createElement('button');pBtn.className='bp-act-btn';pBtn.style.background='linear-gradient(135deg,#f59e0b,#d97706)';

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const k=Math.floor(Math.random()*(i+1));[arr[i],arr[k]]=[arr[k],arr[i]];}return arr;}
function pickUnique(pool,n){const p=shuffle([...pool]);return p.slice(0,n);}
function getReviewPool(type){const f=type===1?'wrongMt':type===2?'wrongMa':'wrongEn';return (S[f]||[]).slice();}
function markWrong(type,key){const f=type===1?'wrongMt':type===2?'wrongMa':'wrongEn';if(!S[f])S[f]=[];if(S[f].indexOf(key)<0)S[f].push(key);if(S[f].length>30)S[f].shift();save();}
function markRight(type,key){const f=type===1?'wrongMt':type===2?'wrongMa':'wrongEn';if(!S[f])return;const i=S[f].indexOf(key);if(i>=0){S[f].splice(i,1);save();}}
function genQuestions(){
  const total=10;
  if(mgType===1){return genMultQuestions(total);}
  if(mgType===2){return genMathQuestions(total);}
  // English: use level-based difficulty, non-repeating picks, optional review injection
  const lv=S.enLv||1;
  // Level-based pool ratios
  let poolItems=[];
  if(lv<=1){poolItems=[...VOCAB.easy];}
  else if(lv<=2){poolItems=[...VOCAB.easy,...VOCAB.medium.slice(0,Math.ceil(VOCAB.medium.length*0.3))];}
  else if(lv<=3){poolItems=[...VOCAB.easy.slice(Math.floor(VOCAB.easy.length*0.3)),...VOCAB.medium,...VOCAB.hard.slice(0,Math.ceil(VOCAB.hard.length*0.3))];}
  else if(lv<=4){poolItems=[...VOCAB.medium,...VOCAB.hard];}
  else{poolItems=[...VOCAB.hard];if(VOCAB.expert)poolItems.push(...VOCAB.expert);}
  // Inject up to 2 review words if available
  const reviewKeys=getReviewPool(0).slice(0,2);
  const reviewWords=[];
  reviewKeys.forEach(k=>{
    const found=[...VOCAB.easy,...VOCAB.medium,...VOCAB.hard,...(VOCAB.expert||[])].find(x=>x.w===k);
    if(found)reviewWords.push(found);
  });
  const remaining=total-reviewWords.length;
  const picks=pickUnique(poolItems,remaining).concat(reviewWords);
  shuffle(picks);
  const qs=picks.slice(0,total).map(w=>{
    const wd=(VOCAB.expert||[]).includes(w)?4:VOCAB.hard.includes(w)?3:VOCAB.medium.includes(w)?2:1;
    const bones=Math.min(6,wd+Math.floor((lv-1)/2));
    const xp=Math.min(5,wd+Math.floor((lv-1)/3));
    if(Math.random()<.35){
      return {type:'spell',word:w.w,hint:w.h,cn:w.c,bones:bones+1,xp:xp+1,reviewKey:w.w};
    }else{
      const wrongPool=[...VOCAB.easy,...VOCAB.medium,...VOCAB.hard,...(VOCAB.expert||[])].filter(x=>x.w!==w.w&&x.c!==w.c);
      const wrongs=shuffle([...wrongPool]).slice(0,3);
      const opts=[{t:w.c,ok:true},...wrongs.map(x=>({t:x.c,ok:false}))];
      shuffle(opts);
      return {type:'choice',word:w.w,hint:w.h,opts,bones,xp,reviewKey:w.w};
    }
  });
  return qs;
}
function genMultQuestions(total){
  // 九九乘法: level-scaled ranges, non-repeating pairs
  const lv=S.mtLv||1;
  const rangeHi=Math.min(9,(mgDiff===1?5:9)+(lv-1));
  const rangeLo=(mgDiff===3?3:1)+Math.max(0,lv-4);
  // Build full (a,b) pairs pool, pick without repetition
  const pairs=[];
  for(let a=rangeLo;a<=rangeHi;a++)for(let b=rangeLo;b<=rangeHi;b++)pairs.push([a,b]);
  shuffle(pairs);
  // Review queue injection
  const reviewKeys=getReviewPool(1).slice(0,2);
  const reviewPairs=reviewKeys.map(k=>k.split('x').map(n=>parseInt(n))).filter(p=>p.length===2&&!isNaN(p[0])&&!isNaN(p[1]));
  const picks=reviewPairs.concat(pairs).slice(0,total);
  const qs=picks.map(([a,b])=>{
    const correct=a*b;
    const wrongs=new Set();
    while(wrongs.size<3){
      const delta=[-12,-9,-6,-3,-1,1,3,6,9,12][Math.floor(Math.random()*10)];
      const w=correct+delta;
      if(w>0&&w!==correct)wrongs.add(w);
    }
    const optArr=[correct,...wrongs];shuffle(optArr);
    const bones=((a>=6||b>=6)?2:1)+Math.floor((lv-1)/2);
    const xp=((a>=6||b>=6)?2:1)+Math.floor((lv-1)/3);
    return {type:'math',q:`${a} \u00D7 ${b} = ?`,opts:optArr.map(n=>String(n)),ans:optArr.indexOf(correct),bones,xp,reviewKey:`${a}x${b}`};
  });
  return qs;
}
function genMathQuestions(total){
  // 二年級數學: add/sub/word problems, level-scaled range, non-repeating questions
  const lv=S.maLv||1;
  const hi=Math.min(200,(mgDiff===1?20:mgDiff===2?50:100)+(lv-1)*10);
  const names=['\u5C0F\u660E','\u5C0F\u83EF','Ben','Sara','\u5C0F\u5B89','Lily'];
  const items=['\u5305\u5B50','\u989C\u8272\u7B46','cookies','stickers','\u67B3\u5B50','pencils'];
  const seen=new Set();
  const qs=[];
  let tries=0;
  while(qs.length<total&&tries<total*6){
    tries++;
    const isWord=Math.random()<.25&&(mgDiff>=2||lv>=2);
    if(isWord){
      const a=2+Math.floor(Math.random()*(hi/2));
      const b=1+Math.floor(Math.random()*(hi/2));
      const nm=names[Math.floor(Math.random()*names.length)],it=items[Math.floor(Math.random()*items.length)];
      const isAdd=Math.random()<.5;
      const correct=isAdd?a+b:Math.max(a,b)-Math.min(a,b);
      const key=`w${isAdd?'+':'-'}${Math.max(a,b)},${Math.min(a,b)}`;
      if(seen.has(key))continue;seen.add(key);
      const q=curLang==='zh'?(isAdd?`${nm}\u6709${a}\u500B${it}\uFF0C\u53C8\u62FF\u5230${b}\u500B\uFF0C\u5171\u6709\u5E7E\u500B\uFF1F`:`${nm}\u6709${Math.max(a,b)}\u500B${it}\uFF0C\u7D66\u6389${Math.min(a,b)}\u500B\uFF0C\u9084\u5269\u5E7E\u500B\uFF1F`):(isAdd?`${nm} has ${a} ${it}, gets ${b} more. Total?`:`${nm} has ${Math.max(a,b)} ${it}, gives ${Math.min(a,b)} away. Left?`);
      const wrongs=new Set();while(wrongs.size<3){const d=[-5,-3,-2,-1,1,2,3,5][Math.floor(Math.random()*8)];const w=correct+d;if(w>=0&&w!==correct)wrongs.add(w);}
      const optArr=[correct,...wrongs];shuffle(optArr);
      qs.push({type:'math',q,opts:optArr.map(n=>String(n)),ans:optArr.indexOf(correct),bones:3+Math.floor((lv-1)/2),xp:3,reviewKey:key});
    }else{
      const a=1+Math.floor(Math.random()*hi),b=1+Math.floor(Math.random()*hi);
      const isAdd=Math.random()<.5;
      const correct=isAdd?a+b:Math.max(a,b)-Math.min(a,b);
      const qtxt=isAdd?`${a} + ${b} = ?`:`${Math.max(a,b)} \u2212 ${Math.min(a,b)} = ?`;
      const key=isAdd?`+${a},${b}`:`-${Math.max(a,b)},${Math.min(a,b)}`;
      if(seen.has(key))continue;seen.add(key);
      const wrongs=new Set();while(wrongs.size<3){const d=[-10,-5,-3,-1,1,3,5,10][Math.floor(Math.random()*8)];const w=correct+d;if(w>=0&&w!==correct)wrongs.add(w);}
      const optArr=[correct,...wrongs];shuffle(optArr);
      qs.push({type:'math',q:qtxt,opts:optArr.map(n=>String(n)),ans:optArr.indexOf(correct),bones:mgDiff+Math.floor((lv-1)/2),xp:mgDiff,reviewKey:key});
    }
  }
  return qs;
}

function renderStory(){
  const list=document.getElementById('storyList');if(!list)return;
  list.innerHTML='';
  if(!S.storiesUnlocked)S.storiesUnlocked=[];
  STORIES.forEach(st=>{
    const unlocked=S.storiesUnlocked.indexOf(st.id)>=0;
    const title=curLang==='zh'?st.tZh:st.tEn;
    const card=document.createElement('div');
    card.style.cssText='background:'+(unlocked?'linear-gradient(135deg,#fef3c7,#fde68a)':'#f3f4f6')+';border:2px solid '+(unlocked?'#f59e0b':'#d1d5db')+';border-radius:14px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px;';
    const left=document.createElement('div');
    left.style.cssText='flex:1;min-width:0;';
    const numEmoji='\u{1F4D6} '+('0'+st.id).slice(-2);
    left.innerHTML='<div style="font-size:12px;color:#6b7280;margin-bottom:2px;">'+numEmoji+'</div><div style="font-size:15px;font-weight:800;color:'+(unlocked?'#92400e':'#6b7280')+';line-height:1.3;">'+title+'</div>';
    card.appendChild(left);
    const btn=document.createElement('button');
    btn.className='sbtn';
    btn.style.cssText='flex-shrink:0;padding:8px 12px;font-size:13px;min-width:90px;';
    if(unlocked){
      btn.textContent=T('storyRead');
      btn.style.background='linear-gradient(135deg,#10b981,#059669)';
      btn.onclick=()=>openStory(st.id);
    }else{
      btn.textContent=T('storyUnlock');
      btn.style.background='linear-gradient(135deg,#f59e0b,#d97706)';
      if(S.bones<STORY_COST)btn.style.opacity='.55';

    card.appendChild(btn);
    list.appendChild(card);
  });
}

  if(S.bones<STORY_COST){alert(T('storyNotEnough'));return;}

let rdState={mode:'intro',qIdx:0,correct:0,bonesEarned:0,answered:false,art:null};
let teachCloseCb=null;
function todayStrR(){const d=new Date();return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function pickDailyArticle(){
  if(typeof ARTICLES==='undefined'||!ARTICLES.length)return null;
  const today=todayStrR();
  if(S.readDate===today&&S.readArticleId){
    const a=ARTICLES.find(x=>x.id===S.readArticleId);
    if(a)return a;
  }
  const ms=new Date(today+'T00:00:00').getTime();
  let idx=Math.floor(ms/86400000)%ARTICLES.length;
  if(idx<0)idx+=ARTICLES.length;
  return ARTICLES[idx];
}
function speakText(txt){
  if(!('speechSynthesis' in window))return;
  try{window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(String(txt||''));u.lang='en-US';u.rate=.9;u.pitch=1;window.speechSynthesis.speak(u);}catch(e){}
}
function renderClickableText(text){
  const parts=(text||'').split(/(\s+|[,.!?;:"\u201C\u201D]+)/);
  let html='';
  parts.forEach(function(p){
    if(!p)return;
    if(/^[a-zA-Z\u2019'\-]+$/.test(p)){
      const esc=escapeHtml(p);
      const jsw=p.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\u2019/g,"\\u2019");
      html+='<span class="read-word" onclick="speakText(\''+jsw+'\')" style="cursor:pointer;padding:0 1px;border-radius:3px;">'+esc+'</span>';
    }else{html+=escapeHtml(p);}
  });
  return html;
}

function startReadingQuiz(art){rdState={mode:'quiz',qIdx:0,correct:0,bonesEarned:0,answered:false,art:art};showReadingQ();}
function showReadingQ(){
  const host=document.getElementById('readingArea');if(!host)return;
  const st=rdState;const q=st.art.questions[st.qIdx];
  const qTxt=curLang==='zh'?(q.qZh||q.q):q.q;
  const opts=curLang==='zh'?(q.optsZh||q.opts):q.opts;
  const titleTop=curLang==='zh'?st.art.titleZh:st.art.titleEn;
  let html=''+
    '<div style="font-size:14px;font-weight:700;color:#b45309;margin-bottom:10px;">'+escapeHtml(titleTop)+'</div>'+
    '<div style="background:#eff6ff;border:2px solid #3b82f6;border-radius:12px;padding:12px;">'+
      '<div style="font-size:13px;color:#1e40af;margin-bottom:6px;font-weight:700;">'+T('readQ').replace('{n}',st.qIdx+1)+'</div>'+
      '<div style="font-size:16px;font-weight:800;color:#1e3a8a;margin-bottom:10px;line-height:1.5;">'+escapeHtml(qTxt)+'</div>'+
      '<div id="readOpts" style="display:flex;flex-direction:column;gap:8px;">';
  opts.forEach(function(o,i){html+='<button class="sbtn" data-i="'+i+'" style="text-align:left;padding:10px 12px;background:#fff;border:2px solid #bfdbfe;color:#1e40af;font-weight:600;">'+String.fromCharCode(65+i)+'. '+escapeHtml(o)+'</button>';});
  html+='</div><div id="readRes" style="margin-top:10px;min-height:22px;"></div></div>';
  host.innerHTML=html;
  document.querySelectorAll('#readOpts button').forEach(function(b){b.addEventListener('click',function(){answerReadingQ(parseInt(b.dataset.i));});});
}
function answerReadingQ(i){
  const st=rdState;if(st.answered)return;st.answered=true;
  const q=st.art.questions[st.qIdx];
  const correct=(i===q.ans);
  document.querySelectorAll('#readOpts button').forEach(function(b,bi){
    b.disabled=true;
    if(bi===q.ans){b.style.background='linear-gradient(135deg,#10b981,#059669)';b.style.color='#fff';b.style.borderColor='#059669';}
    else if(bi===i){b.style.background='linear-gradient(135deg,#ef4444,#dc2626)';b.style.color='#fff';b.style.borderColor='#dc2626';}
    else{b.style.opacity='.5';}
  });
  const res=document.getElementById('readRes');
  if(correct){
    st.correct++;
    if(res)res.innerHTML='<div style="color:#10b981;font-weight:800;">'+T('readCorrect')+'</div>';
    try{snd('bone');}catch(e){}
    setTimeout(nextReadingQ,900);
  }else{
    if(res)res.innerHTML='<div style="color:#ef4444;font-weight:800;">'+T('readWrong')+'</div>';
    try{snd('uncheck');}catch(e){}
    setTimeout(function(){showTeach(st.art.teach,function(){nextReadingQ();});},500);
  }
}
function nextReadingQ(){const st=rdState;st.qIdx++;st.answered=false;if(st.qIdx>=st.art.questions.length){finishReadingQuiz();}else{showReadingQ();}}
function finishReadingQuiz(){
  const st=rdState;
  const bones=st.correct*5;st.bonesEarned=bones;
  if(bones>0){S.bones=(S.bones||0)+bones;S.totalBones=(S.totalBones||0)+bones;}
  const today=todayStrR();
  if(!S.readDone)S.readDone={};
  if(!S.readScores)S.readScores={};
  S.readDone[today]=st.art.id;
  S.readScores[today]={c:st.correct,b:bones,id:st.art.id};
  save();try{updateHdr();}catch(e){}
  const host=document.getElementById('readingArea');
  if(host){
    host.innerHTML=
      '<div style="background:#d1fae5;border:2px solid #10b981;border-radius:12px;padding:18px;text-align:center;">'+
        '<div style="font-size:48px;">\u{1F389}</div>'+
        '<div style="font-size:20px;font-weight:900;color:#065f46;margin:6px 0;">'+T('mgOver')+'</div>'+
        '<div style="font-size:16px;color:#047857;">'+T('readScore').replace('{c}',st.correct).replace('{b}',bones)+'</div>'+
        '<button class="sbtn" id="readBackBtn" style="margin-top:12px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;">'+T('storyCloseBtn')+'</button>'+
      '</div>';
    const bk=document.getElementById('readBackBtn');if(bk)bk.onclick=function(){renderReading();};
  }
}

// ============= TABS =============
document.querySelectorAll('.tab2').forEach(tab=>{tab.addEventListener('click',function(){
  document.querySelectorAll('.tab2').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.pane2').forEach(p=>p.classList.remove('on'));
  this.classList.add('on');document.getElementById('p2-'+this.dataset.t).classList.add('on');
  if(this.dataset.t==='shop')renderShop();
  if(this.dataset.t==='history')renderHistory();
  if(this.dataset.t==='settings')renderSettings();
  if(this.dataset.t==='game'){resetMiniGame();renderLvBar();}
  if(this.dataset.t==='story'){if(typeof renderReading==='function')renderReading();else if(typeof renderStory==='function')renderStory();}
});});

// Lock numpad
function setupLockNumpad(){const np=document.getElementById('lNumpad');np.innerHTML='';
[1,2,3,4,5,6,7,8,9,T('clear'),0,T('ok')].forEach(v=>{const b=document.createElement('button');b.className='nk';b.textContent=v;b.onclick=()=>{if(v===T('clear')){pinBuf='';updateLockDots();}else if(v===T('ok')){if(pinBuf.length===4){if(pinBuf===S.pin){closeLockOv();if(pinMode==='parent'){document.getElementById('parentZone').style.display='block';renderMandList();document.getElementById('multSel').value=S.mult;}else startTimer();pinBuf='';}else{document.getElementById('lockErr').textContent=T('wrongPin');snd('uncheck');setTimeout(()=>{pinBuf='';updateLockDots();document.getElementById('lockErr').textContent='';},1000);}}}else if(pinBuf.length<4){pinBuf+=v;updateLockDots();if(pinMode==='lock'&&pinBuf.length===4){if(pinBuf===S.pin){closeLockOv();startTimer();pinBuf='';}else{document.getElementById('lockErr').textContent=T('wrongPin');snd('uncheck');setTimeout(()=>{pinBuf='';updateLockDots();document.getElementById('lockErr').textContent='';},1000);}}}};np.appendChild(b);});}

// ============= INIT =============
function startGame(){
  resizeScene();calcStreak();processDecay();
  dogX=.3+Math.random()*.4;dogY=.6+Math.random()*.15;dogTargetX=dogX;dogStateTimer=60;
  applyLang();renderHabits();updateHdr();renderBP();
  requestAnimationFrame(()=>{resizeScene();drawScene();animLoop();});
  startTimer();
  checkNightLock();save();
  const tRec=todayRec();
  if(S.streak===0&&!(tRec&&tRec.completed)){document.getElementById('streakInfo').style.background='linear-gradient(135deg,#ef4444,#f59e0b)';document.getElementById('streakInfo').innerHTML=T('streakBroken');}
  window.addEventListener('resize',()=>resizeScene());
  function tryBGM(){if(soundOn)startBGM();document.removeEventListener('click',tryBGM);document.removeEventListener('touchstart',tryBGM);}
  document.addEventListener('click',tryBGM);document.addEventListener('touchstart',tryBGM);
  setTimeout(()=>showTutorial(),500);
}
function init(){load();setupLockNumpad();if(!initSetup())startGame();}
init();
</script>
